name: example
description: Example Flutter app using saropa_drift_viewer with a Drift database.
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  saropa_drift_viewer:
    path: ..

dev_dependencies:
  drift_dev: ^2.32.0
  build_runner: ^2.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
