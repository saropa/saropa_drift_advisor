      prefer_overflow_bar_over_button_bar: true  # [INFO] Prefer OverflowBar instead of ButtonBar for Material action button rows. OverflowBar is the supported pattern for horizontal actions that reflow on overflow (Flutter 3.13.0, PR #128437). ButtonBar, ButtonBarThemeData, and ThemeData.buttonBarTheme were deprecated in Flutter 3.24.0 (PR #145523). Remove buttonBarTheme from ThemeData and migrate widgets to OverflowBar; theme ButtonBarThemeData has no direct replacement — apply spacing and alignment on OverflowBar or surrounding layout. {v2}
