      require_change_notifier_dispose: true  # [ERROR] Failing to dispose a ChangeNotifier (or ValueNotifier, etc.) in the dispose() method causes it to retain all listeners and references in the widget tree, resulting in memory leaks and potential crashes when notifications are sent to unmounted widgets. This is a common source of subtle bugs and degraded performance in Flutter apps. {v5}
      require_clipboard_paste_validation: true  # [INFO] Clipboard data used without validation. Pasted content can be unexpected format or malicious. Validate clipboard data before using it. This creates a security vulnerability that attackers can exploit to compromise user data or application integrity. {v2}
      require_connectivity_error_handling: true  # [WARNING] Connectivity check without error handling. checkConnectivity() can throw platform exceptions. {v2}
      require_connectivity_subscription_cancel: true  # [ERROR] If you do not cancel your connectivity subscription, your app will leak memory and system resources. This can cause crashes, slowdowns, and unpredictable behavior, especially after repeated hot reloads or navigation. {v3}
      require_currency_code_with_amount: true  # [INFO] Money amount without currency information. Amounts without currency are ambiguous. Always pair amounts with currency codes. This monetary calculation can produce rounding errors that accumulate, causing financial discrepancies. {v2}
      require_currency_formatting_locale: true  # [INFO] NumberFormat.currency() without a locale can format currency inconsistently for users. Currency formatting depends heavily on locale. Without explicit locale, the format may not match user expectations. {v2}
      require_dark_mode_testing: true  # [WARNING] MaterialApp missing darkTheme. App won't adapt to dark mode. Apps should support dark mode for accessibility and user preference. Without darkTheme, the app won't adapt when the user enables dark mode. {v2}
      require_database_close: true  # [WARNING] Unclosed database connection leaks resources and may exhaust connection pool, causing app failures. {v7}
      require_debouncer_cancel: true  # [ERROR] Uncanceled debounce timer fires after dispose, calling setState on unmounted widget causing crashes. {v1}
      require_deep_link_fallback: true  # [WARNING] Deep link handler navigates to content without verifying the target exists or is accessible. When a deep link references deleted, restricted, or invalid content, the app either crashes with a null reference error or displays a blank screen. Users tapping expired links in emails, notifications, or shared messages encounter a broken experience. {v9}
      require_default_text_style: true  # [INFO] Multiple sibling Text widgets repeat the same TextStyle, creating redundant style objects and making future style changes error-prone since each instance must be updated independently. DefaultTextStyle applies a shared style to all descendant Text widgets automatically, keeping the code DRY and consistent. {v5}
      require_deprecation_message: true  # [INFO] Deprecated annotation should include migration guidance. Missing documentation makes the API harder to use correctly and increases onboarding time. {v6}
      require_dialog_barrier_consideration: true  # [INFO] Destructive confirmation dialog (delete, remove, logout) defaults to barrierDismissible: true, allowing users to accidentally dismiss the dialog by tapping outside. This can silently skip the confirmation step, or worse, leave the user unsure whether the action was confirmed or canceled. {v2}
      require_dialog_barrier_dismissible: true  # [INFO] Default barrier behavior may allow accidental dismissal, losing unsaved user input. {v3}
      require_dialog_tests: true  # [INFO] Dialog test may be incomplete. Ensure pumpAndSettle after showing dialog. Dialogs require special handling: tap to open, find within dialog context, test dismiss behavior. Don't forget barrier dismiss tests. {v2}
      require_did_update_widget_check: true  # [INFO] didUpdateWidget triggers updates without checking if properties changed, causing unnecessary rebuilds. didUpdateWidget receives the old widget for comparison. Without comparing oldWidget to widget, you might trigger unnecessary updates. {v3}
      require_disabled_state: true  # [INFO] Button without custom disabled styling uses the framework default gray appearance, which may not match your app design system or provide sufficient contrast. Customizing the disabled state ensures visual consistency, communicates the disabled status clearly, and maintains your brand identity across all button states. {v5}
      require_dispose_implementation: true  # [ERROR] Controllers, subscriptions, or timers without cleanup cause memory leaks and setState errors. {v3}
      require_dispose_pattern: true  # [WARNING] Class has StreamController, AnimationController, or other disposable fields but no cleanup method. These controllers leak memory and can crash when accessed after disposal. {v4}
      require_drag_feedback: true  # [INFO] Draggable without a feedback widget shows no visual representation of the dragged item under the user finger/cursor. The original child disappears (replaced by childWhenDragging or nothing) while the drag area appears empty, making it impossible for the user to see what they are dragging or where to drop it. {v4}
      require_empty_results_state: true  # [INFO] List with search-related name missing empty state check. Search results should show a helpful message when no results are found. Empty ListView/GridView with no indicator confuses users. {v2}
      require_envied_obfuscation: true  # [WARNING] Envied environment variable generated without obfuscation stores secrets as plain text string constants in the compiled binary. Attackers can extract API keys, database URLs, and authentication tokens using basic reverse engineering tools, enabling unauthorized access to your backend services and third-party APIs. {v2}
      require_error_case_tests: true  # [INFO] Test file has no error case tests. Consider adding tests for exceptions. {v4}
      require_feature_flag_type_safety: true  # [INFO] Feature flag accessed with a raw string literal key. String-based lookups are error-prone: typos compile successfully but fail silently at runtime, renames require a fragile codebase-wide search-and-replace, and there is no compile-time guarantee the flag name exists. {v1}
      require_file_exists_check: true  # [INFO] File read operation should check exists() or use try-catch. File operations on non-existent files throw exceptions. Always verify the file exists or wrap in try-catch to handle missing files gracefully. {v3}
      require_form_auto_validate_mode: true  # [INFO] Form should specify autovalidateMode for consistent UX. Forms should specify how validation is triggered for consistent UX. The autovalidateMode parameter controls when the form fields validate. {v2}
      require_form_validation: true  # [WARNING] TextFormField inside a Form without a validator function bypasses the form validation pipeline entirely. Calling formKey.currentState.validate() will always return true for this field, allowing invalid or empty input to reach the backend, causing data integrity issues and poor user feedback. {v3}
      require_go_router_error_handler: true  # [INFO] GoRouter instance lacks an errorBuilder or errorPageBuilder parameter. When a user navigates to an undefined path via deep link, push notification, or typo, the router displays a blank white screen with no explanation or way to recover. {v3}
      require_go_router_fallback_route: true  # [WARNING] GoRouter configuration without errorBuilder or errorPageBuilder has no fallback for unmatched routes. When users navigate to a non-existent path via deep link, push notification, or typo, the router throws an unhandled exception that crashes the app instead of showing a helpful error page. {v2}
      require_golden_test: true  # [INFO] Add golden test for visual verification. Golden tests catch visual regressions automatically. Visual widgets must have golden tests. This weakens test quality, making failures harder to diagnose and reducing confidence in the test suite. {v3}
      require_google_fonts_fallback: true  # [WARNING] GoogleFonts should specify fontFamilyFallback. Google Fonts may fail to load on slow connections or offline. Without a fallback, text may be invisible or use system default unexpectedly. {v2}
      require_google_signin_error_handling: true  # [WARNING] Google Sign-In call without error handling crashes when the user cancels the sign-in flow, the network is unavailable, or Google Play Services are outdated. Users see an unhandled exception crash screen instead of a friendly error message, causing frustration and potential data loss in unsaved work. {v3}
      require_graphql_error_handling: true  # [WARNING] GraphQL query and mutation results must check hasException before accessing data. Failing to check for errors can cause runtime crashes, display incomplete or misleading data, and make debugging difficult. This is a common source of silent failures and poor user experience in apps using GraphQL. {v3}
      require_graphql_operation_names: true  # [INFO] Defining anonymous GraphQL queries, mutations, or subscriptions (without an operation name) makes debugging, error tracking, and persisted queries more difficult. Operation names are essential for identifying and managing GraphQL operations in large codebases and production environments. {v2}
      require_hero_tag_uniqueness: true  # [ERROR] Using duplicate Hero tags within the same navigation context causes Hero animations to fail, resulting in visual glitches and confusing user experiences. This can break navigation transitions and reduce the perceived quality of your app. Ensure each Hero tag is unique within a given Navigator to maintain smooth and predictable animations. See https://docs.flutter.dev/ui/animations/hero-animations#the-hero-tag. {v3}
      require_hover_states: true  # [INFO] Interactive widget on web/desktop without hover feedback feels unresponsive to mouse users. Hover states are a fundamental interaction pattern on these platforms, signaling clickability and providing visual confirmation that the cursor is over the target. Missing hover states make the app feel like a mobile port rather than a native desktop experience. {v6}
      require_http_status_check: true  # [WARNING] HTTP response body is used without first checking the status code. This can result in undetected failures, silent data corruption, or security issues if error responses are parsed as valid data. Always check if (response.statusCode == 200) before parsing response.body to ensure only successful responses are processed and errors are handled appropriately. {v5}
      require_https_over_http: true  # [ERROR] HTTP transmits data in plain text. Attackers can intercept credentials, tokens, and user data. {v1}
      require_image_description: true  # [WARNING] Image without semanticLabel is announced as "image" by screen readers, providing no useful information. {v2}
      require_image_error_builder: true  # [WARNING] Network image without errorBuilder shows a broken image icon or blank space when the URL is invalid, the server is down, or the network is unavailable. This creates a poor user experience with no indication of what went wrong and no way to retry loading the image. {v3}
      require_image_loading_placeholder: true  # [INFO] Image.network without loadingBuilder shows blank space during load. Network images take time to download. Without a loading indicator, users see an empty space which creates a poor user experience. {v4}
      require_image_picker_permission_android: true  # [WARNING] Missing CAMERA permission causes SecurityException crash when user tries to take a photo. {v4}
      require_image_picker_permission_ios: true  # [WARNING] Using ImageSource.camera requires NSCameraUsageDescription in Info.plist — missing it causes a crash or App Store rejection. Gallery-only usage does not need this. {v6}
      require_image_semantics: true  # [WARNING] Image constructor lacks a semanticLabel parameter. Screen readers cannot describe this image to users with visual impairments, making the content inaccessible. This violates WCAG 1.1.1 (Non-text Content) and may exclude your app from accessibility-mandated markets. {v6}
      require_integration_test_setup: true  # [WARNING] Integration test missing IntegrationTestWidgetsFlutterBinding.ensureInitialized(). Integration tests need IntegrationTestWidgetsFlutterBinding.ensureInitialized() in main(). Without it, tests hang or crash on device. {v2}
      require_integration_test_timeout: true  # [WARNING] Integration test without timeout. May hang CI indefinitely. Long-running tests without timeouts can hang CI indefinitely. Always set timeouts on integration tests to catch infinite loops. {v2}
      require_interval_timer_cancel: true  # [ERROR] Timer.periodic without cancel(). Timer keeps firing after State disposal, draining battery and causing setState errors. {v2}
      require_intl_currency_format: true  # [WARNING] Currency value formatted manually using string interpolation with currency symbols. Symbol placement (prefix vs suffix), decimal separator (period vs comma), and digit grouping vary by locale. Manual formatting produces incorrect output for international users, causing financial confusion and misread amounts that undermine trust. {v3}
      require_intl_date_format_locale: true  # [WARNING] DateFormat created without an explicit locale parameter. The format output varies unpredictably across devices and platforms because each uses a different system default locale. Users in different regions see dates in unexpected formats (e.g., MM/DD/YYYY vs DD/MM/YYYY), leading to confusion about whether 01/02 means January 2nd or February 1st. {v2}
      require_ios_accessibility_large_text: true  # [INFO] Hardcoded font size may not respect iOS Dynamic Type. Use theme text styles for accessibility. {v2}
      require_ios_app_group_capability: true  # [INFO] App extension data sharing detected. Ensure App Groups capability is enabled in Xcode for both main app and extensions. {v2}
      require_ios_app_review_prompt_timing: true  # [WARNING] App review request detected in initialization context. Do not request reviews on first launch or during startup. {v2}
      require_ios_callkit_integration: true  # [WARNING] VoIP call handling detected. iOS requires CallKit integration for native call UI. Without CallKit, incoming calls will not appear on the lock screen, call audio routing will fail, and Apple will reject your app from the App Store during review. {v4}
      require_ios_dynamic_island_safe_zones: true  # [WARNING] Fixed top padding (44pt or 59pt) detected. Dynamic Island height varies by device. Use MediaQuery.padding.top instead. {v2}
      require_ios_low_power_mode_handling: true  # [INFO] Heavy animation or background activity detected. Consider checking iOS Low Power Mode and adapting behavior. {v2}
      require_ios_method_channel_cleanup: true  # [WARNING] MethodChannel handler set without cleanup. Set handler to null in dispose() to prevent memory leaks. {v2}
      require_ios_minimum_version_check: true  # [INFO] iOS version-specific API detected. Ensure iOS version is checked before using this API. {v2}
      require_ios_multitasking_support: true  # [INFO] Fixed layout detected. iPads support Split View and Slide Over. Layouts should adapt to window size changes. {v2}
      require_ios_nfc_capability_check: true  # [WARNING] NFC usage detected. Not all iOS devices support NFC. Check capability before use. {v2}
      require_ios_photo_library_add_usage: true  # [WARNING] Photo saving detected. iOS requires NSPhotoLibraryAddUsageDescription for saving photos (separate from read permission). {v2}
      require_ios_photo_library_limited_access: true  # [INFO] Photo library access detected. Handle iOS 14+ limited access mode where user may only grant access to selected photos. {v2}
      require_ios_push_notification_capability: true  # [INFO] Push notification usage detected. Ensure Push Notifications capability is enabled in Xcode and APNs is configured. {v3}
      require_json_decode_try_catch: true  # [WARNING] jsonDecode throws on malformed JSON. Unhandled exceptions can crash the app, cause silent data loss, and make debugging difficult. This is a common source of runtime errors in networked and user-input scenarios. {v2}
      require_key_for_collection: true  # [WARNING] List items in dynamic collections (ListView, GridView, etc.) must have a Key to preserve child widget state (e.g., TextField input, animations) when the list reorders or updates. Missing keys can cause UI bugs, loss of user input, broken animations, and confusing user experiences. This is a common source of hard-to-debug Flutter widget tree issues. {v4}
      require_keyboard_action_type: true  # [INFO] Text field must have textInputAction to improve UX. The textInputAction parameter controls the keyboard action button (e.g., Next, Done). This improves form navigation and UX. {v2}
      require_keyboard_dismiss_on_scroll: true  # [INFO] Scroll view must have keyboardDismissBehavior for form UX. ScrollViews containing text fields should specify how the keyboard dismisses when the user scrolls. This provides better UX for forms in scrollable content. {v2}
      require_keyboard_visibility_dispose: true  # [WARNING] A KeyboardVisibilityController subscription that is never canceled keeps firing visibility callbacks after the widget is disposed, so setState runs on an unmounted State and throws, while the retained listener leaks the widget and the subtree it closes over. {v2}
      require_location_timeout: true  # [WARNING] Location request without timeout can hang indefinitely if GPS is unavailable, freezing the app. {v3}
      require_logout_cleanup: true  # [WARNING] Incomplete logout cleanup leaves session tokens, cached user data, and authentication state accessible in local storage. On shared or stolen devices, the next user can access the previous account, personal data, and session tokens without re-authenticating, enabling unauthorized account access. {v4}
      require_long_press_callback: true  # [INFO] Interactive list item without onLongPress misses a standard mobile interaction pattern for secondary actions. Users expect long-press to reveal context menus, selection mode, or additional options. Omitting this leaves no discoverable path to bulk actions like delete, share, or move. {v3}
      require_mock_verification: true  # [INFO] Mock is stubbed but never verified. Creating mocks without verification means the test doesn't check behavior. This weakens test quality, making failures harder to diagnose and reducing confidence in the test suite. {v4}
      require_network_status_check: true  # [INFO] `[HEURISTIC]` Network call without connectivity check. Verify network status before making requests to avoid silent failures. {v3}
      require_notification_for_long_tasks: true  # [WARNING] Long-running operation detected without progress notification. Silent background work may be killed by OS. {v2}
      require_notification_handler_top_level: true  # [ERROR] If your notification handler is not a top-level function, background messages will be silently dropped when the app is terminated or in the background. Users will miss important notifications and your app may fail compliance checks. {v3}
      require_null_safe_extensions: true  # [WARNING] Extension method on a nullable type does not handle null receivers. This can cause runtime exceptions. Extension methods on nullable types should check for null. {v4}
      require_null_safe_json_access: true  # [ERROR] Accessing values from a JSON map without checking for key existence or null values can throw exceptions (such as NoSuchMethodError or TypeError) if the key is missing or the value is null. This is a common source of runtime crashes and unstable code, especially when dealing with data from APIs, user input, or external sources. Null-safe access is essential for robust, production-quality Dart and Flutter applications. {v4}
      require_number_format_locale: true  # [WARNING] NumberFormat without explicit locale. 1,234.56 vs 1.234,56 varies by device. Consequence: Numbers may be formatted incorrectly for users in different locales, leading to misinterpretation. {v3}
      require_openai_error_handling: true  # [WARNING] OpenAI API call without error handling crashes when the service returns rate limit errors (429), the API is temporarily unavailable (503), or the request exceeds token limits. Users see an unhandled exception crash screen instead of graceful fallback behavior, causing lost context and a broken experience. {v3}
      require_orientation_handling: true  # [INFO] MaterialApp without orientation handling. May break in landscape. This widget pattern increases complexity and makes the widget tree harder to maintain and debug. {v3}
      require_pagination_error_recovery: true  # [INFO] Paginated list has no visible error recovery. Failed page loads need a retry option so users can recover. {v1}
      require_pagination_loading_state: true  # [INFO] Paginated list triggers loadMore but shows no loading indicator. Infinite scroll lists should show a loading indicator when fetching the next page of results. {v2}
      require_pdf_error_handling: true  # [WARNING] PDF loading operation lacks try-catch error handling. PDF files can be corrupted, missing, or have invalid format. Without error handling, failures crash the application instead of showing user-friendly error messages. {v3}
      require_pdf_loading_indicator: true  # [INFO] PDF viewer should provide loading feedback. PDF loading can be slow, especially for large documents or over network. Users should see progress feedback during load. {v2}
      require_permission_manifest_android: true  # [WARNING] Runtime permission request without manifest entry always fails. Feature silently stops working. {v3}
      require_permission_permanent_denial_handling: true  # [WARNING] Permission request does not handle permanent denial. Users who permanently deny a permission are stuck with no way to re-enable it from within the app, causing frustration and feature abandonment. {v3}
      require_permission_plist_ios: true  # [WARNING] iOS requires usage descriptions in Info.plist. App crashes or gets rejected from App Store without them. {v3}
      require_price_localization: true  # [INFO] Hardcoded price detected. Prices vary by region and currency. Users may see incorrect amounts. {v3}
      require_receive_port_close: true  # [ERROR] Leaving a ReceivePort open after it is no longer needed can cause memory leaks and keep isolates alive unnecessarily, leading to wasted resources and potential app instability. This can also prevent garbage collection of related objects. See https://dart.dev/guides/libraries/concurrency#isolates. {v2}
      require_refresh_indicator: true  # [INFO] List displaying remote data without pull-to-refresh forces users to navigate away and back to see updated content. This common UX pattern is expected on both platforms, and its absence makes the app feel unresponsive when data becomes stale. Users have no self-service way to recover from a failed initial load. {v5}
      require_refresh_indicator_on_lists: true  # [INFO] ListView without RefreshIndicator. Users can't pull to refresh. Pull-to-refresh is a standard mobile UX pattern. Lists with dynamic content should support manual refresh. {v3}
      require_request_timeout: true  # [WARNING] HTTP request is missing a timeout configuration, which means it may hang indefinitely if the server does not respond. This can cause the app to freeze, degrade user experience, and waste socket connections and memory. Always add .timeout(Duration(seconds: 30)) or configure timeout in client options to ensure requests fail gracefully and users are informed of network issues. {v4}
      require_responsive_breakpoints: true  # [INFO] Using magic numbers for breakpoints in MediaQuery makes code unclear and hard to maintain. Readers won’t know what the number means. {v2}
      require_resume_state_refresh: true  # [INFO] App handles paused state but not resumed, leaving UI stale after returning from background. When app returns from background, data may be stale and must be refreshed. Missing resumed handling leads to outdated UI. {v2}
      require_rtl_layout_support: true  # [WARNING] Hardcoded left/right directional value detected. This layout will render incorrectly for RTL (right-to-left) languages such as Arabic, Hebrew, Persian, and Urdu, affecting over 500 million users worldwide. Use directional equivalents (start/end) that automatically adapt to the text direction, ensuring your layout works correctly in both LTR and RTL contexts. {v1}
      require_safe_json_parsing: true  # [WARNING] JSON parsing may throw on missing keys. JSON parsing should handle missing or null values gracefully to avoid runtime exceptions. This weakens type safety, allowing errors to reach runtime where they crash instead of being caught at compile time. {v4}
      require_screen_size_tests: true  # [INFO] Widget test does not verify behavior at multiple screen sizes. Responsive layouts can break on different devices, and single-size tests miss overflow and layout errors at runtime. {v3}
      require_scroll_controller: true  # [INFO] Add ScrollController for scroll tracking. ScrollController is needed for infinite scroll and scroll position tracking. Scrollable lists must have a ScrollController. {v3}
      require_scroll_physics: true  # [INFO] Scrollable widget should specify scroll physics. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v5}
      require_sdk_upper_bound: true  # [WARNING] The Dart SDK constraint in pubspec.yaml has a lower bound but no upper bound, so pub get will resolve against unreleased future major SDKs that have never been tested against this code. A breaking SDK major can change language semantics or remove APIs you depend on without any warning at resolve time. Pin an upper bound such as <4.0.0 so moving to a new SDK major is a deliberate, reviewed change. {v1}
      require_search_loading_indicator: true  # [INFO] Search callback without loading state management. When triggering a search (API call), users need feedback that something is happening. Missing loading state causes confusion. {v2}
      require_secure_keyboard: true  # [WARNING] Password field detected without obscureText: true. The password is displayed as plain text on screen, exposing credentials to shoulder surfing attacks in public spaces. Nearby observers can read the password directly from the display, compromising user account security and violating OWASP M1 credential protection guidelines. {v3}
      require_secure_storage_auth_data: true  # [ERROR] Plaintext auth tokens enable session hijacking via device backup or physical access. {v3}
      require_secure_storage_error_handling: true  # [WARNING] Secure storage operation without error handling. May fail on some devices. {v3}
      require_semantic_label_icons: true  # [WARNING] Icon child element is missing a semanticLabel, making it invisible or meaningless to screen readers and assistive technologies. All icons that convey information or actions in the widget tree must have a descriptive semanticLabel for accessibility compliance. {v2}
      require_semantics_label: true  # [WARNING] This Semantics child element with a button, link, or other interactive role is missing a label, making it inaccessible to screen readers. Without a label, users cannot understand the purpose of the interactive element, which reduces usability and fails accessibility standards. Labels are essential for describing the action or purpose of interactive elements in the widget tree. {v5}
      require_shared_prefs_key_constants: true  # [INFO] String literal used as SharedPreferences key. Use named constants. Using string literals for keys is error-prone and makes refactoring difficult. Define keys as constants for type safety and easier maintenance. {v4}
      require_shared_prefs_null_handling: true  # [WARNING] SharedPreferences getter with null assertion (!) crashes with a NoSuchMethodError if the key does not exist. This is a common source of production crashes on first launch, after app updates that add new preference keys, or when storage is cleared by the OS under memory pressure. {v3}
      require_snackbar_duration: true  # [INFO] Default duration varies by platform, causing inconsistent UX across devices. {v3}
      require_socket_close: true  # [ERROR] Not closing a Socket keeps the TCP connection open indefinitely, occupying server connection slots, leaking file descriptors, and potentially exhausting OS resources. This can prevent new network connections and degrade app or system performance. {v2}
      require_step_count_indicator: true  # [INFO] Multi-step flow with 3+ conditional step views lacks a progress indicator. Users have no visibility into how many steps remain, leading to abandonment when the process feels open-ended. {v2}
      require_stepper_validation: true  # [INFO] Stepper onStepContinue callback does not validate form input before proceeding. This can allow users to advance with incomplete or invalid data, leading to errors or inconsistent state. {v3}
      require_stream_error_handling: true  # [WARNING] Stream.listen() is called without providing an onError callback or wrapping the stream in a try-catch. Unhandled stream errors propagate as uncaught exceptions, which crash your app in production and terminate the stream connection permanently, preventing any further data from being received. {v2}
      require_super_dispose_call: true  # [ERROR] Missing super.dispose() prevents parent State cleanup, causing memory leaks and broken widget lifecycle. {v1}
      require_super_init_state_call: true  # [ERROR] Missing super.initState() skips parent initialization, breaking framework contracts and causing subtle bugs. {v2}
      require_svg_error_handler: true  # [WARNING] SvgPicture without errorBuilder shows blank on invalid SVG. SVG loading can fail for various reasons. Without an error builder, the UI may break or show nothing when an SVG fails to load. {v3}
      require_test_assertions: true  # [WARNING] Test has no assertions. Tests without assertions don't actually verify anything. This rule uses simple string matching on the test body source code for fast detection. {v4}
      require_test_description_convention: true  # [INFO] Test description should explain what is being tested and expected behavior. Test descriptions should explain WHAT is being tested and WHAT the expected behavior is. This helps with test maintenance and debugging. {v3}
      require_test_isolation: true  # [WARNING] Mutable top-level variable may cause test coupling. Tests must not share mutable state. Use setUp/tearDown to reset state between tests for proper isolation. {v4}
      require_text_input_type: true  # [INFO] TextField without keyboardType. Users may see wrong keyboard. Setting the appropriate keyboardType improves user experience by showing the right keyboard layout for the expected input. {v2}
      require_text_overflow_handling: true  # [WARNING] Text displaying dynamic content (user input, API data, translations) without overflow handling can break layouts when the text is longer than expected. Unbounded text pushes sibling widgets off-screen, triggers RenderFlex overflow errors in Row/Column contexts, and creates inconsistent UI across locales with varying text lengths. {v3}
      require_text_scale_factor_awareness: true  # [WARNING] Fixed-height container with Text child may clip or overflow when users increase text scale. Use flexible layout or minHeight instead. {v1}
      require_timer_cancellation: true  # [WARNING] Timer or StreamSubscription must be canceled in dispose(). Timers and stream subscriptions that aren't canceled will continue running after the widget is disposed, causing: - Crashes if they call setState on a disposed widget - Memory leaks from retained references - Wasted CPU cycles. {v5}
      require_timezone_display: true  # [INFO] DateFormat includes time components but no timezone indicator. Users may misinterpret displayed times when the timezone is ambiguous, leading to missed appointments, incorrect scheduling, and poor user experience across time zones. {v1}
      require_url_launcher_encoding: true  # [WARNING] URL passed to launchUrl or canLaunchUrl contains string interpolation without Uri.encodeComponent(). Unencoded special characters (spaces, ampersands, Unicode) produce malformed URLs that fail to open, display incorrect content, or enable URL injection attacks where user input manipulates the destination path or query parameters. {v2}
      require_validator_return_null: true  # [ERROR] Non-null return on valid input shows error message even when field is correct, confusing users. Validator functions in forms must return null for valid input. Returning a non-null value causes error messages to display even when the field is correct, leading to user frustration and broken form validation. {v3}
      require_video_player_controller_dispose: true  # [ERROR] When a State class creates a VideoPlayerController for a video widget (such as a video player, gallery, carousel, or story view) and does not dispose of it in dispose(), the controller will keep video and audio resources alive after the widget is removed from the widget tree. This can cause memory leaks, background playback, battery drain, and even prevent other apps from acquiring audio focus. In video-heavy UIs or dynamic lists, this can quickly exhaust device resources and degrade app performance. Always dispose of every VideoPlayerController in the owning State object’s dispose() method to ensure proper cleanup. See: https://pub.dev/packages/video_player#disposing {v3}
      require_websocket_error_handling: true  # [WARNING] WebSocket stream.listen() is missing an onError handler. Unhandled errors can crash your app, disconnect users, and make debugging network issues difficult. All WebSocket listeners must handle errors to ensure robust, production-quality networking. {v3}
      require_widgets_binding_callback: true  # [WARNING] showDialog/showModalBottomSheet in initState without addPostFrameCallback may fail. {v2}
      require_workmanager_for_background: true  # [WARNING] Periodic task detected without workmanager. Dart isolates die when app backgrounds. Use workmanager for reliable background tasks. {v2}
      require_wss_over_ws: true  # [ERROR] ws:// transmits data unencrypted. Attackers can intercept, read, and modify WebSocket messages in transit. {v1}
      secure_pubspec_urls: true  # [WARNING] Insecure URL (http:// or git://) found in pubspec.yaml dependency source. Plain HTTP and unencrypted git:// URLs are vulnerable to man-in-the-middle attacks that could inject malicious code into your dependencies. Always use https:// for dependency URLs to ensure integrity and authenticity. {v1}
      use_setstate_synchronously: true  # [WARNING] setState called after async gap without mounted check. Quick fix available: Wraps the setState call in if (mounted) { .. }. This violates the widget lifecycle, risking setState-after-dispose errors or silent state corruption. {v11}
      use_truncating_division: true  # [WARNING] Prefer truncating division (`~/`) instead of `/` followed by `.toInt()`.

      #
      # --- TIER 3: PROFESSIONAL (571 rules) ---
      #
      avoid_absorb_pointer_misuse: true  # [INFO] AbsorbPointer blocks ALL touch events. Prefer IgnorePointer instead. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v3}
      avoid_accessing_other_classes_private_members: true  # [WARNING] Accessing a private member of another class in the same file. In Dart, underscore-prefixed members are private to the library (file), not to the class. This means classes in the same file can reach into each other's internal state — but this violates encapsulation and creates maintenance debt. When the code is later refactored (classes split into different files), these accesses break. {v1}
      avoid_android_task_affinity_default: true  # [INFO] Starting Android activity via platform channel. Verify taskAffinity is set in AndroidManifest.xml. {v2}
      avoid_animation_in_large_list: true  # [WARNING] Animation widget inside ListView builder. All items run animations even when off-screen, causing performance issues. {v2}
      avoid_auto_route_context_navigation: true  # [WARNING] String-based context.push() or context.go() is used in an auto_route project. auto_route provides typed route classes for navigation that are compile-time checked, support deep linking, and work correctly with nested routers. String-based navigation bypasses all of these benefits and can push onto the wrong router in nested navigation setups, causing confusing back-button behavior and incorrect URL updates on web. {v1}
      avoid_auto_route_keep_history_misuse: true  # [WARNING] replaceAll() or popUntilRoot() clears the navigation stack outside an authentication flow. replaceAll destroys the user's entire navigation history so the back button no longer works as expected. popUntilRoot pops every intermediate route. These are appropriate for login, logout, and onboarding flows but are a common source of bugs when used for general navigation. The user loses their place and cannot navigate back to where they were. {v1}
      avoid_autoplay_audio: true  # [INFO] Autoplay is blocked on iOS/web and annoys users. Autoplaying audio is blocked on iOS/web and annoying to users. Require explicit user interaction to start playback. {v3}
      avoid_badge_without_meaning: true  # [INFO] Displaying a badge with a count of 0 provides no useful information to users and can create visual noise or confusion. Badges are intended to highlight actionable or noteworthy items, and showing them when empty diminishes their value. {v2}
      avoid_behavior_subject_last_value: true  # [WARNING] Accessing .value on a BehaviorSubject that may be closed. BehaviorSubject retains its last emitted value even after close() is called. Reading .value on a closed subject returns stale data that no longer reflects the current state, which can cause subtle logic errors and prevents garbage collection of the retained object. If replay behavior is not needed, consider using PublishSubject instead. {v1}
      avoid_bool_in_widget_constructors: true  # [INFO] Widget constructor has a named bool parameter. Prefer an enum or widget decomposition for clearer call sites.
      avoid_border_all: true  # [INFO] Prefer Border.fromBorderSide for const borders. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v6}
      avoid_brightness_check_for_theme: true  # [INFO] Manually checking Theme.of(context).brightness to pick light/dark colors bypasses the colorScheme system, which already provides semantically correct colors for each theme mode. Brightness checks are fragile, miss high-contrast mode, and scatter color logic throughout the codebase instead of centralizing it in the theme. {v2}
      avoid_business_logic_in_ui: true  # [INFO] Widget class contains methods named with calculation or transformation verbs (calculate, compute, validate, process, etc.), indicating business logic embedded in the UI layer. This violates separation of concerns, making the logic impossible to reuse across screens, untestable without widget infrastructure, and tightly coupled to Flutter framework classes. {v5}
      avoid_calling_of_in_build: true  # [INFO] Multiple .of(context) lookups walk the InheritedWidget ancestor chain on every rebuild call. Each lookup traverses the widget tree upward, adding cumulative overhead that slows frame rendering. This is especially costly when called multiple times in a single build method for the same provider type. {v3}
      avoid_capturing_this_in_callbacks: true  # [INFO] Closure callback captures a reference to the entire enclosing object instance via implicit this. This prevents garbage collection of the object and all its fields for as long as the callback exists. Long-lived callbacks such as stream listeners, timers, or global event handlers create memory leaks that accumulate over the app session lifetime. {v4}
      avoid_circular_imports: true  # [WARNING] Circular import detected. This file is part of an import cycle. {v2}
      avoid_clip_during_animation: true  # [WARNING] A Clip widget is used inside an animated widget, causing expensive rasterization on every animation frame. ClipRRect, ClipOval, and ClipPath force the GPU to re-clip content 60+ times per second during animation, which leads to janky motion and dropped frames. ClipPath is especially costly because it forces software rasterization. Move the clip outside the animated scope or use BoxDecoration.borderRadius for rounded corners. {v1}
      avoid_closure_capture_leaks: true  # [WARNING] setState() is called inside a Timer or Future.delayed callback without a mounted check. The closure captures the State object, and if the widget is disposed before the callback fires, calling setState throws a "setState() called after dispose()" error at runtime. This is a common source of crashes in production, especially on slow networks or with periodic timers. Always check mounted before calling setState in async callbacks. {v1}
      avoid_collection_mutating_methods: true  # [WARNING] Mutating a collection in-place inside setState keeps the same object reference, which some state management solutions may not detect. Additionally, mutating shared collections breaks immutable-first architectures. Use the spread operator to create a new collection instead of modifying the existing one. {v1}
      avoid_complex_arithmetic_expressions: true  # [INFO] Arithmetic expression has more than 4 operators. Complex arithmetic expressions are hard to understand and maintain. Extract parts into named variables. {v4}
      avoid_complex_loop_conditions: true  # [INFO] Loop condition contains too many operators or nested expressions, making it difficult to reason about when the loop terminates. Complex conditions increase the risk of off-by-one errors and infinite loops that are hard to diagnose. {v4}
      avoid_context_in_static_methods: true  # [INFO] BuildContext in static method. Consider instance method or extension instead. {v3}
      avoid_continuous_location_updates: true  # [WARNING] Continuous location stream without distance filter. GPS polling drains battery rapidly — a typical app consumes 10-15% battery per hour with continuous updates. Most use cases (ride tracking, delivery, fitness) work well with a distance filter (50-100m) that only fires when the user moves significantly. Use getPositionStream with a distanceFilter or switch to geofencing for area-based triggers. {v1}
      avoid_cross_feature_dependencies: true  # [INFO] File inside a feature module imports from a different feature module directory, creating a direct cross-feature dependency. This breaks feature isolation, prevents independent development and testing of features, and makes it impossible to extract or remove a feature without cascading changes across the codebase. Cross-feature coupling also increases merge conflicts and deployment risks. {v5}
      avoid_datetime_comparison_without_precision: true  # [INFO] Direct equality comparison (== or !=) on DateTime objects is unreliable because two timestamps representing the same logical moment almost never share identical microsecond values. Network latency, clock drift, serialization rounding, and independent construction all introduce sub-second differences that cause equality checks to silently fail, leading to missed cache hits, duplicate entries, and incorrect conditional logic. {v2}
      avoid_declaring_call_method: true  # [INFO] call() method makes class callable but hides intent. Code reads ambiguously. A class declares a call() method. {v5}
      avoid_direct_data_access_in_ui: true  # [WARNING] Widget class declares a field typed as Repository, DataSource, ApiClient, or similar data-layer class, creating a direct coupling between the UI and data implementation. This bypasses the domain/business logic layer, making the widget untestable in isolation, difficult to refactor when data sources change, and prone to leaking data concerns into the presentation layer. {v5}
      avoid_double_and_int_checks: true  # [INFO] Condition is always false: int and double are disjoint types in Dart; no value can be both.
      avoid_duplicate_cascades: true  # [WARNING] Duplicate cascade operation detected on the same target. Identical cascade members are likely copy-paste errors that produce redundant side effects and increase maintenance risk. {v4}
      avoid_duplicate_constant_values: true  # [INFO] Multiple constants share the same value in this scope. Duplicate constant definitions increase maintenance cost because changes must be applied to every copy, and inconsistent updates lead to subtle logic errors when the values diverge. {v3}
      avoid_duplicate_initializers: true  # [INFO] Same initialization expression appears in multiple initializer list entries. Duplicate expressions waste computation, increase the risk of inconsistent updates when one copy is changed but others are missed, and obscure the intended initialization logic. {v4}
      avoid_dynamic_json_access: true  # [WARNING] Chained dynamic JSON access without null checks throws NoSuchMethodError at runtime when any intermediate key is missing or null. This causes unhandled crashes in production when API responses deviate from the expected schema, with no compile-time safety net. {v6}
      avoid_elevation_opacity_in_dark: true  # [INFO] High elevation (>4) without brightness check. Shadows look poor in dark mode. Elevation shadows appear differently in dark mode. Material Design recommends using surface overlays instead of shadows in dark themes. {v2}
      avoid_empty_setstate: true  # [INFO] setState callback is empty — state was likely modified before this call. An empty setState(() {}) still triggers a rebuild, but moving state changes inside the callback makes the intent clearer. {v5}
      avoid_encryption_key_in_memory: true  # [INFO] Encryption key stored as a persistent class field remains in process memory for the lifetime of the object. Memory dumps, debugging tools, or memory-scanning malware can extract the key, compromising all data encrypted with it. Keys in memory survive garbage collection and are visible in heap snapshots. {v2}
      avoid_entitlement_without_server: true  # [WARNING] Client-side IAP entitlement check without server-side receipt verification. PurchaseStatus.purchased can be spoofed on rooted or jailbroken devices, allowing users to unlock premium features without paying. Server-side receipt validation via your backend or a service like RevenueCat is required for secure in-app purchase verification (OWASP M1/M4). {v1}
      avoid_excessive_bottom_nav_items: true  # [INFO] BottomNavigationBar with more than 5 items crowds the UI. More than 5 bottom navigation items crowds the UI and makes tap targets too small for comfortable use. {v3}
      avoid_expanded_as_spacer: true  # [INFO] Use Spacer() instead of Expanded with empty child. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v6}
      avoid_expando_circular_references: true  # [WARNING] Creating a circular reference by storing a reference to an Expando key inside its own value prevents Dart’s garbage collector from reclaiming memory, resulting in memory leaks. This subtle bug can cause your app’s memory usage to grow over time, degrade performance, and eventually lead to crashes or out-of-memory errors, especially in long-running or data-intensive applications. Such leaks are difficult to detect and debug, making it critical to avoid circular references when using Expando for metadata or caching. {v5}
      avoid_expensive_computation_in_build: true  # [WARNING] Expensive computation detected inside build() method. Build runs on every frame during animations and on every state change, so heavy operations here cause jank, dropped frames, and sluggish UI responsiveness. Users will experience visible stuttering especially during transitions and scrolling. {v2}
      avoid_expensive_did_change_dependencies: true  # [WARNING] Expensive operation detected inside didChangeDependencies(). This callback runs every time an InheritedWidget dependency changes (theme, locale, media query), which can be very frequent. Network calls, database queries, and heavy computation here cause redundant work, jank, and wasted bandwidth on every dependency change. {v1}
      avoid_explicit_pattern_field_name: true  # [INFO] Explicit pattern field name matches variable name. Explicit field names are used in pattern matching when they match the variable name. This pattern matching usage can cause unexpected behavior or miss important type information. {v3}
      avoid_extensions_on_records: true  # [INFO] Extension on record type. Records lack identity for extension discovery. This pattern matching usage can cause unexpected behavior or miss important type information. {v4}
      avoid_field_initializers_in_const_classes: true  # [INFO] Const class has a field with an inline initializer. Prefer moving it to the constructor initializer list for clarity.
      avoid_find_all: true  # [INFO] Generic finder (Text, Container, etc.) matches many widgets. Use specific finder. Using generic finders like find.byType(Text) matches many widgets and makes tests fragile. Use more specific finders. {v2}
      avoid_find_by_text: true  # [INFO] Prefer find.byKey() for widget interactions instead of find.text(). - find.text() is appropriate for verifying displayed content. - find.byKey() is preferred for tapping/interacting with widgets because it's stable when text changes (e.g., i18n, A/B testing). {v3}
      avoid_fitted_box_for_text: true  # [INFO] FittedBox scales Text widgets uniformly, shrinking the entire text to fit the container. This ignores the user accessibility text scaling preference, can render text unreadably small on narrow screens, and defeats the purpose of responsive text layout. Use text-specific overflow handling instead. {v3}
      avoid_fixed_dimensions: true  # [INFO] Fixed pixel dimensions may not work on all screen sizes. Fixed pixel dimensions break on different screen sizes. Use responsive sizing with Flexible, Expanded, FractionallySizedBox, or constraints. {v4}
      avoid_flexible_outside_flex: true  # [WARNING] The Flexible or Expanded widget is being used outside of a Row, Column, or Flex parent. This breaks layout expectations and can cause runtime errors or unexpected UI behavior, as Flexible/Expanded are only designed to work within Flex-based widgets. Using them elsewhere will not provide the intended flexible sizing and may result in layout exceptions. {v6}
      avoid_font_weight_as_number: true  # [INFO] Numeric FontWeight values like w400 or w700 are less readable and harder to maintain than their named equivalents. Named constants (normal, bold) convey semantic intent, reduce lookup effort during code review, and align with design system terminology used by designers. {v2}
      avoid_form_in_alert_dialog: true  # [INFO] Form placed directly inside AlertDialog loses all field values, validation state, and user input when the dialog rebuilds due to a parent setState() or keyboard appearance. Because the dialog builder creates a new Form on each build call, there is no StatefulWidget to preserve form state across rebuilds, producing a frustrating experience where typed data disappears. {v2}
      avoid_form_validation_on_change: true  # [WARNING] validate() called inside an onChanged callback. This triggers full form validation on every keystroke, causing visible input lag, excessive premature error messages, and distracting red error text that appears character-by-character before the user finishes typing. Validate on submit or focus-lost instead. {v1}
      avoid_form_without_unfocus: true  # [INFO] Form submission handler does not call unfocus() before processing. The on-screen keyboard stays open after submission, blocking the success message, navigation, or dialog that confirms the action to the user. This creates a confusing experience where users cannot see feedback and may repeatedly tap the submit button. {v2}
      avoid_full_sync_on_every_launch: true  # [WARNING] Bulk data fetch detected in initState. Downloading the entire dataset on every launch is slow and wastes bandwidth. This causes unnecessary network traffic and increases startup time, especially on slow connections. Use delta sync with timestamps or change feeds to only fetch what changed since the last sync. {v1}
      avoid_function_type_in_records: true  # [INFO] Inline function type in record reduces readability. Function types in records are hard to read and maintain. Use a typedef instead. This pattern matching usage can cause unexpected behavior or miss important type information. {v5}
      avoid_generics_shadowing: true  # [INFO] Generic type parameter shadows a top-level declaration. This class design reduces clarity and can lead to incorrect object initialization. {v4}
      avoid_gesture_detector_in_scrollview: true  # [WARNING] GestureDetector around scrollable can cause gesture conflicts. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v6}
      avoid_getit_in_build: true  # [WARNING] GetIt service locator in build() hides dependencies. Service locator calls in build() hide dependencies and make testing difficult. Inject dependencies via constructor instead. {v2}
      avoid_getx_static_get: true  # [WARNING] Get.find<T>() is a static service locator call that creates a hidden dependency on the global GetX container. This pattern makes the class impossible to unit test in isolation because there is no way to substitute a mock without initializing the full GetX dependency graph. It also obscures the true dependency count of the class, making it harder to detect god-object violations and architectural boundary breaches. {v2}
      avoid_global_key_misuse: true  # [INFO] Multiple GlobalKey instances in a single class indicate overuse of an expensive mechanism. Each GlobalKey prevents Flutter from efficiently diffing the widget tree, forces cross-tree reference tracking, and can cause unexpected widget reparenting that corrupts state and degrades rendering performance. {v2}
      avoid_go_router_string_paths: true  # [INFO] String literal used as a navigation path in go_router. Hardcoded path strings are error-prone, bypass compile-time validation, and break silently when route definitions change. {v3}
      avoid_hardcoded_app_name: true  # [INFO] App name must not be hardcoded in UI. App names may need to vary by market or locale. App name or branding is hardcoded. {v4}
      avoid_hardcoded_asset_paths: true  # [INFO] Hardcoded asset path string is error-prone: typos produce silent runtime failures, path changes require find-and-replace across the codebase, and the compiler cannot verify the asset exists. Centralized asset references enable compile-time safety and single-source-of-truth for all asset paths. {v5}
      avoid_hardcoded_colors: true  # [INFO] Hardcoded color value bypasses the theme system, breaking dark mode and dynamic theming. When users switch themes, hardcoded colors remain unchanged, creating contrast issues, illegible text, and an inconsistent visual experience that can fail accessibility requirements. {v6}
      avoid_hardcoded_config_test: true  # [INFO] Hardcoded configuration detected in test file. Consider using a const or shared test helper. {v2}
      avoid_hardcoded_delays: true  # [WARNING] Hardcoded delay in test is flaky. Use pumpAndSettle() instead. Hardcoded delays are flaky - too short and tests fail intermittently, too long and tests waste time. Use pumpAndSettle() or wait for conditions. {v1}
      avoid_hardcoded_duration: true  # [INFO] Hardcoded Duration values make it difficult to maintain consistent timing across the app and can lead to subtle bugs when timings need to be updated globally. This practice reduces maintainability and increases the risk of inconsistent user experiences. Always extract Duration values to named constants for clarity, reusability, and easier updates. {v2}
      avoid_hardcoded_feature_flags: true  # [INFO] Hardcoded if(true)/if(false) suggests incomplete feature flag. Hardcoded conditions like if (true) or if (false) suggest incomplete feature flag implementation or dead code. {v2}
      avoid_hardcoded_locale: true  # [INFO] Hardcoded locale ignores user's device settings. Apps should respect the user's device locale settings. {v6}
      avoid_hardcoded_strings_in_ui: true  # [INFO] Hardcoded user-facing string. Cannot be translated to other languages. User-facing strings should use localization (l10n) instead of hardcoded text for proper internationalization. {v4}
      avoid_icon_size_override: true  # [INFO] Setting icon size directly on individual Icon widgets scatters sizing values throughout the codebase, causing inconsistencies when the design system changes. IconTheme provides a single point of control for icon sizing within a subtree, keeping all icons consistent and easier to update. {v2}
      avoid_identical_exception_handling_blocks: true  # [INFO] Multiple catch blocks contain identical handling code. Duplicated exception handling increases maintenance burden because changes must be applied to every copy, and missed updates lead to inconsistent error recovery behavior. {v5}
      avoid_if_with_many_branches: true  # [INFO] If/else-if chain has more than 4 branches, making the control flow difficult to follow. Long chains are error-prone because conditions are checked sequentially and later branches depend on all previous conditions being false. {v5}
      avoid_image_picker_large_files: true  # [WARNING] pickImage without imageQuality allows raw photos that can be 10+ MB in size, creating slow uploads and wasteful bandwidth consumption. Large image files cause network timeouts, drain battery, consume expensive mobile data, and may trigger out-of-memory errors when the app attempts to process them. {v5}
      avoid_image_picker_quick_succession: true  # [WARNING] Image picker method called without a loading guard. Calling pickImage() or pickVideo() while another picker is already active throws a PlatformException (ALREADY_ACTIVE) that crashes the app. Users who double-tap "Choose Photo" or press it during a slow gallery load will trigger this crash. Add a boolean loading flag that prevents concurrent picker invocations. {v1}
      avoid_image_picker_without_source: true  # [WARNING] ImagePicker called without specifying an ImageSource shows a blank or empty picker dialog on some Android devices and older iOS versions. Users see a non-functional dialog and cannot select or capture images, resulting in a broken feature that provides no error feedback or alternative selection path. {v2}
      avoid_image_repeat: true  # [INFO] ImageRepeat tiles the image across the available space, which is rarely the intended behavior for photos or icons and usually signals a misconfigured decoration. Tiled images consume additional GPU memory for the repeated texture and can produce visual artifacts at tile boundaries on different screen densities. {v4}
      avoid_image_without_cache: true  # [INFO] Image.network without cacheWidth or cacheHeight decodes the full-resolution image into memory, even when displayed at a smaller size. A 4000x3000 photo decoded at full resolution consumes ~48 MB of GPU memory, causing excessive memory usage and potential out-of-memory crashes on low-end devices. {v6}
      avoid_implicit_animation_dispose_cast: true  # [WARNING] Calling dispose() on (animation as CurvedAnimation) in an ImplicitlyAnimatedWidgetState subclass is redundant and unsafe. The framework owns that CurvedAnimation and disposes it when super.dispose() runs (Flutter 3.7+, PR #111849). Remove this call and rely on super.dispose() only. {v1}
      avoid_importing_entrypoint_exports: true  # [INFO] This import resolves to a file that re-exports the entry point (e.g. main.dart). Importing from such files pulls the app bootstrap into the dependency graph and can cause unintended coupling and side effects. {v1}
      avoid_incomplete_copy_with: true  # [INFO] copyWith() is missing fields. Copied objects will lose data for those fields. All non-final fields must be included in copyWith for complete copying. {v4}
      avoid_inconsistent_digit_separators: true  # [INFO] Digit separators are not grouped consistently. Digit separators should group digits by 3 for readability. {v4}
      avoid_infinite_scroll_duplicate_requests: true  # [WARNING] Scroll listener triggers data loading without a loading guard. When the user scrolls to the bottom, this fires multiple simultaneous requests because the listener fires continuously while at max extent. This wastes bandwidth, causes duplicate items in the list, and may trigger API rate limits. Check an isLoading flag before loading. {v1}
      avoid_inverted_boolean_checks: true  # [INFO] Boolean expression negated with ! when a direct opposite operator exists. Negated conditions add a mental inversion step for readers and are more error-prone during modification, especially in compound expressions with multiple negations. {v4}
      avoid_ios_deprecated_uikit: true  # [WARNING] Deprecated UIKit API pattern detected in platform channel code. Platform channel code (Swift/Objective-C) that uses deprecated UIKit APIs will generate warnings during Xcode builds and may be rejected by App Store in future iOS versions. {v2}
      avoid_ios_hardcoded_bundle_id: true  # [INFO] Hardcoded bundle ID detected. Bundle IDs should come from configuration, not hardcoded strings. {v2}
      avoid_ios_misleading_push_notifications: true  # [INFO] Marketing notification pattern detected. Push notifications must be relevant to user interests to comply with Apple guidelines. {v2}
      avoid_large_isolate_communication: true  # [INFO] Sending large objects between isolates is expensive. Sending large objects between isolates requires copying, which is expensive. Use SendPort with TransferableTypedData for large data. {v3}
      avoid_large_objects_in_state: true  # [WARNING] Unbounded List, Map, Set, or ByteData field declared in a State class grows without limit as data accumulates. Without pagination or size constraints, this allocates excessive memory that degrades scroll performance, increases garbage collection pressure, and eventually crashes the app with an out-of-memory error on devices with limited RAM. {v4}
      avoid_layout_builder_misuse: true  # [INFO] LayoutBuilder should use constraints in its builder. LayoutBuilder is used inefficiently. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v6}
      avoid_layout_passes: true  # [WARNING] Using IntrinsicWidth or IntrinsicHeight causes Flutter to perform two layout passes for affected child widgets in the build tree, which significantly hurts performance, especially in complex UIs or lists. This can lead to dropped frames, laggy animations, and poor user experience. Prefer using CrossAxisAlignment.stretch, Expanded, or fixed dimensions to avoid extra layout computation. {v2}
      avoid_loading_flash: true  # [INFO] Loading indicator shown without delay. Fast responses will cause jarring visual flash. {v2}
      avoid_long_event_handlers: true  # [INFO] Bloc event handler is too long. Extract logic to separate methods. Long event handlers indicate the handler is doing too much. Extract business logic to separate methods or services for testability. {v1}
      avoid_long_length_test_files: true  # [INFO] Test file exceeds 1000 code lines (comments and blank lines excluded). A 1000+ line test file is difficult to navigate and likely tests multiple distinct features. Extract test groups into separate files organized by feature area. {v2}
      avoid_long_records: true  # [INFO] Record has more than 5 fields, reducing readability. Records with excessive fields lose their clarity advantage over classes and become harder to destructure, understand, and maintain. {v3}
      avoid_medium_length_test_files: true  # [INFO] Test file exceeds 600 code lines (comments and blank lines excluded). At 600+ lines, a test file may be covering too many scenarios or features. Split tests by domain, widget, or use case to improve maintainability and faster test runs. {v2}
      avoid_merged_semantics_hiding_info: true  # [INFO] MergeSemantics hides interactive elements from screen readers, making buttons/inputs unusable. {v5}
      avoid_misleading_documentation: true  # [INFO] Documentation does not match the method name or code behavior. Mismatched docs confuse maintainers and lead to incorrect usage. {v4}
      avoid_missed_calls: true  # [INFO] Function reference passed without parentheses where a call was likely intended. Without the () invocation, the function is not executed and the reference is silently discarded, meaning the intended side effect or return value is lost. {v5}
      avoid_missing_image_alt: true  # [INFO] This Image widget is missing a semanticLabel, which is essential for accessibility. Without a semanticLabel, screen readers cannot describe the image to visually impaired users, making your app less inclusive and potentially non-compliant with accessibility standards. {v4}
      avoid_mixing_named_and_positional_fields: true  # [INFO] Record mixes named and positional fields. Mixing named and positional fields in records reduces readability. This pattern matching usage can cause unexpected behavior or miss important type information. {v4}
      avoid_multi_assignment: true  # [INFO] Multiple chained assignments detected. Chained assignments reduce readability and can be confusing. This excessive complexity makes the code harder to understand, test, and maintain. {v4}
