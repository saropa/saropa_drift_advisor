      require_accessible_images: true  # [WARNING] Image element lacks accessibility handling, making it invisible to screen readers and users with visual impairments. Without a semanticLabel describing the image content, assistive technologies skip over it entirely, leaving users unable to understand the visual context. This violates WCAG 1.1.1 (Non-text Content), which requires all meaningful images to have a text alternative. {v2}
      require_analytics_error_handling: true  # [INFO] Analytics method call without error handling. Analytics SDKs (Firebase Analytics, Mixpanel, Amplitude) can throw when the SDK is not initialized, the network is unavailable, or event parameters are invalid. A failed analytics call should never crash the app or interrupt user workflows — wrap analytics calls in try-catch and silently log failures instead. {v1}
      require_android_12_splash: true  # [INFO] Flutter splash screen widget detected. Android 12+ shows system splash first, causing potential double-splash. {v2}
      require_app_lifecycle_handling: true  # [INFO] Timer or subscription detected without lifecycle handling. Stop background work when app is inactive to save battery. {v4}
      require_auth_check: true  # [WARNING] Missing auth check allows unauthorized access to protected user data and privileged operations. {v5}
      require_autofill_hints: true  # [INFO] Form field must have autofillHints to improve user experience. The autofillHints parameter enables system autofill to help users complete forms faster. This improves UX especially for common fields like email, password, name, and address. {v2}
      require_avatar_alt_text: true  # [WARNING] Avatar or profile image is missing a semanticLabel or alt text. Screen readers cannot describe the image, making it inaccessible to users who rely on assistive technology. All meaningful images must have a descriptive label. {v2}
