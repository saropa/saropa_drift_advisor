      prefer_padding_over_container: true  # [INFO] Container with only padding creates unnecessary intermediate widgets (DecoratedBox, ConstrainedBox). Padding is a single-purpose widget with fewer allocations and faster layout. {v4}
      prefer_page_storage_key: true  # [INFO] Use PageStorageKey to preserve scroll position. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v5}
      prefer_pan_axis: true  # [WARNING] The 'alignPanAxis' parameter on InteractiveViewer was deprecated in Flutter 3.7 and removed after Flutter 3.19 (PR #142500). The boolean parameter only supported two modes (free or aligned). The replacement panAxis parameter uses a PanAxis enum that adds horizontal-only and vertical-only panning options. Use PanAxis.aligned instead of alignPanAxis: true, or PanAxis.free (the default) instead of alignPanAxis: false. {v1}
      prefer_platform_menu_bar_child: true  # [WARNING] The 'body' parameter on PlatformMenuBar was deprecated in Flutter 3.1 and removed after Flutter 3.16 (PR #138509). The parameter was renamed to follow the standard Flutter widget convention where the single child widget is named 'child'. Code using the old 'body' parameter will fail to compile on Flutter 3.19 and later. {v1}
      prefer_platform_widget_adaptive: true  # [INFO] Consider platform-adaptive widgets. Material-only UI on iOS (or Cupertino-only on Android) may feel inconsistent.
      prefer_positioned_directional: true  # [INFO] Use PositionedDirectional for RTL support. PositionedDirectional respects text direction for RTL languages. Positioned is used instead of PositionedDirectional. {v3}
      prefer_regex_validation: true  # [INFO] Form field with basic empty check but label suggests structured data (email/phone/url). Use regex validation. {v2}
      prefer_return_await: true  # [INFO] Returning a Future directly from an async function skips error propagation and stack trace preservation, making debugging harder. This can hide the source of exceptions and complicate error handling. {v6}
      prefer_reusing_assigned_local: true  # [INFO] A local variable already holds the result of this expression, but the identical expression is recomputed here instead of reusing that local. Recomputing wastes work and risks the two copies drifting apart if one is later edited. {v2}
      prefer_route_settings_name: true  # [INFO] MaterialPageRoute without RouteSettings.name. Analytics and debugging will be harder. {v2}
      prefer_safe_area_aware: true  # [INFO] Content may overlap device notch or system UI. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v4}
      prefer_scalable_text: true  # [INFO] Text uses a fixed font size and does not respect user accessibility settings. This prevents users who rely on larger text for readability from accessing your content. All text should scale with the system text scale factor for accessibility compliance. {v2}
      prefer_scrollbar_theme_of: true  # [INFO] Using Theme.of(context).scrollbarTheme can bypass a local ScrollbarTheme inherited higher in the tree. Flutter migrated to ScrollbarTheme.of(context) (PR #113237) so Scrollbar styling always resolves through the dedicated inherited theme first, with Theme fallback when absent. Prefer ScrollbarTheme.of(context) for correct theme resolution. {v1}
