      avoid_over_fetching: true  # [INFO] Fetching the full object but only using a few fields, wasting bandwidth and serialization time. This network pattern wastes bandwidth and server resources, increasing latency and data costs for users. {v5}
      avoid_passing_self_as_argument: true  # [WARNING] Object passed as an argument to its own method, creating a self-referential call. This pattern often indicates a logic error and can lead to infinite recursion, stack overflow, or unexpected mutation of the object state during method execution. {v4}
      avoid_permission_request_loop: true  # [WARNING] Permission.request() called inside a loop. Repeated permission requests bombard the user with system dialogs. After denial, the OS may auto-deny subsequent requests, making the loop both annoying and futile. Request once, check the result, and direct users to app settings via openAppSettings() if the permission is permanently denied. {v1}
      avoid_pop_without_result: true  # [WARNING] Navigator.push awaits a result but does not handle the null case when the user dismisses the route by pressing the back button or using a system gesture. Accessing properties on a null result throws a runtime exception that crashes the app. This creates a fragile navigation flow that fails under normal user interaction patterns. {v2}
      avoid_print_in_production: true  # [WARNING] print() call found in production widget code. Print statements bypass structured logging, cannot be filtered by severity, pollute the console in release builds, and may inadvertently leak sensitive data. They also add unnecessary I/O overhead in production. {v5}
      avoid_production_config_in_tests: true  # [WARNING] Test may be using production configuration. Tests should use test-specific configuration. This weakens test quality, making failures harder to diagnose and reducing confidence in the test suite. {v4}
      avoid_raw_keyboard_listener: true  # [INFO] RawKeyboardListener is deprecated since Flutter 3.18. It uses the legacy RawKeyEvent system that does not correctly handle key mapping across platforms, missing modifier keys and producing inconsistent key codes. The replacement KeyboardListener uses the modern KeyEvent system with proper platform key mapping. {v4}
      avoid_recursive_tostring: true  # [WARNING] toString() method references itself through $this or this.toString(), creating infinite recursion. The runtime repeatedly invokes toString() until the call stack overflows, crashing the application with an unrecoverable StackOverflowError. {v5}
      avoid_redundant_else: true  # [INFO] Else clause follows a branch that already exits via return, throw, break, or continue. The else keyword is redundant because the code after the if block only runs when the condition is false, adding unnecessary nesting and indentation. {v3}
      avoid_redundant_positional_field_name: true  # [INFO] Positional record field uses redundant default name. Positional record field has an explicit name that matches the default positional field name pattern ($1, $2, etc.). {v4}
      avoid_redundant_pragma_inline: true  # [INFO] Pragma inline annotation applied to a trivial method that the compiler already inlines automatically. Redundant annotations add noise to the codebase, and overusing pragma inline can prevent the compiler from making better optimization decisions. {v5}
      avoid_referencing_subclasses: true  # [INFO] Base class should not reference its subclasses directly. Referencing subclasses creates circular coupling and makes the hierarchy harder to evolve.
      avoid_renaming_representation_getters: true  # [INFO] Extension type should not expose the representation via a getter with a different name. {v1}
      avoid_repaint_boundary_misuse: true  # [INFO] RepaintBoundary around const/static content provides no benefit. RepaintBoundary is used around static content. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v6}
      avoid_returning_cascades: true  # [INFO] Return statement contains a cascade expression (..operator), which obscures the actual return value and can confuse readers about whether the returned object is the cascade target or the result of the last cascade operation. Separating the cascade from the return makes the control flow explicit and easier to debug. {v4}
      avoid_returning_void: true  # [INFO] Explicit void return is redundant and can mask accidental side-effect returns. Writing return at the end of a void function adds visual noise without changing behavior, and in rare cases may hide a mistaken attempt to return a value from a void-typed function. {v6}
      avoid_riverpod_string_provider_name: true  # [INFO] Provider uses manual name string; prefer auto-generated name or code-gen. {v1}
      avoid_screenshot_in_ci: true  # [INFO] Avoid screenshot tests in CI unless stable and fast.
      avoid_secure_storage_large_data: true  # [WARNING] `[HEURISTIC]` Storing large data in secure storage. It's designed for small secrets like tokens. {v3}
      avoid_semantics_in_animation: true  # [INFO] Avoid semantics that change during animation; can confuse screen readers.
      avoid_sequential_awaits: true  # [INFO] Multiple sequential awaits on independent operations. Total time is sum of all; could run in parallel. {v2}
      avoid_service_locator_overuse: true  # [INFO] Service locator (e.g. GetIt.instance) called directly in a widget hides dependencies, makes the widget untestable without the full service container, and couples the UI layer to a specific DI framework. Constructor injection makes dependencies explicit and enables easy mocking in tests. {v6}
      avoid_setstate_in_large_state_class: true  # [INFO] setState() in a large State class causes expensive full rebuilds. Consider breaking into smaller widgets or using granular state. {v1}
      avoid_setters_without_getters: true  # [INFO] Setter has no corresponding getter. Prefer adding a getter or using a named method for write-only semantics.
      avoid_shared_prefs_large_data: true  # [WARNING] SharedPreferences setString called with serialized data (jsonEncode, json.encode, toJson, toString). SharedPreferences loads the entire XML/plist file into memory on first access. Storing JSON blobs or serialized objects wastes memory, degrades app startup time, and risks exceeding platform limits. Use a proper database (Hive, Isar, sqflite) for structured or large data. {v1}
      avoid_single_field_destructuring: true  # [INFO] Single-field destructuring adds syntactic overhead without the readability benefit of multi-field destructuring. The pattern syntax (e.g., final (:name) = obj;) is unfamiliar to many Dart developers and introduces unnecessary complexity when accessing just one property. {v5}
      avoid_singleton_pattern: true  # [INFO] Class uses the singleton pattern (static instance field, factory constructor, and private constructor). Singletons hide dependencies, prevent mocking in unit tests, make it impossible to run tests in parallel with isolated state, and create implicit global state that is difficult to reason about and reset between test cases. {v5}
      avoid_sized_box_expand: true  # [INFO] SizedBox.expand() fills all available space unconditionally, causing unpredictable layout overflow in constrained parents. Inside a Column, Row, or other flex widget without explicit constraints, expand() can trigger unbounded height/width errors or silently push sibling widgets off-screen. {v3}
      avoid_slow_collection_methods: true  # [INFO] sync* generator used for a simple collection that yields a small, fixed number of elements. Generator functions have overhead from creating state machines and lazy iterables that exceeds the cost of building a plain list for small collections. {v5}
      avoid_snackbar_queue_buildup: true  # [INFO] Prefer clearing snackbars before showing new ones. Multiple snackbars can queue up, leading to poor UX where users see stale messages. Prefer clearing or hiding previous snackbars before showing new ones. {v2}
      avoid_sqflite_reserved_words: true  # [WARNING] Using SQLite reserved words as column names in SQL statements can cause syntax errors, failed migrations, and data loss. This is a common source of hard-to-diagnose database bugs and can break schema upgrades or queries. {v3}
      avoid_stateful_widget_in_list: true  # [INFO] StatefulWidget created inside a ListView.builder callback loses its State when scrolled off-screen and recreated, causing input fields to reset, animations to restart, and expanded/collapsed states to revert. The framework cannot preserve State for widgets without stable keys in a lazily-built list. {v6}
      avoid_stateful_without_state: true  # [WARNING] Using a StatefulWidget without any state fields adds unnecessary complexity, increases lifecycle overhead, and can confuse maintainers. This leads to harder-to-read code, wasted memory allocations for the State object, and potential performance issues. {v6}
      avoid_static_route_config: true  # [WARNING] Static router configuration prevents hot reload. Route changes require full restart. {v2}
      avoid_stream_sync_events: true  # [WARNING] Stream event added synchronously right after controller creation. Listeners may not be attached yet. {v2}
      avoid_string_concatenation_in_ui: true  # [INFO] String concatenation breaks internationalization. Word order varies by language, so concatenation breaks i18n. {v4}
      avoid_synchronous_file_io: true  # [WARNING] Synchronous file I/O blocks the main thread, causing UI freezes and dropped frames during disk access. {v4}
      avoid_test_implementation_details: true  # [INFO] Test verifies internal calls. Test behavior, not implementation. Tests that verify internal method calls break when you refactor. Test observable behavior (outputs, state changes) instead. {v3}
      avoid_test_on_real_device: true  # [INFO] Test name suggests running on real device. Real devices vary in performance and state; use emulators/simulators in CI for consistent, reproducible results.
      avoid_text_in_images: true  # [INFO] Image path suggests embedded text that cannot be localized. Text in images cannot be translated. This prevents proper localization, causing text to display incorrectly for users in non-English locales. {v5}
      avoid_text_span_in_build: true  # [INFO] TextSpan recreated inside the build() method forces the Flutter rendering pipeline to recalculate expensive text layout metrics on every widget rebuild. This includes glyph positioning, line breaking, and paragraph layout. The repeated computation causes visible jank during scrolling and animations, especially for RichText with multiple styled spans. {v4}
      avoid_top_level_members_in_tests: true  # [INFO] Public top-level member in test file leaks implementation details and pollutes the library namespace. Other files can accidentally import test helpers, creating fragile dependencies on code that was never designed for reuse and may change without notice. {v3}
      avoid_ui_in_domain_layer: true  # [WARNING] Domain-layer file (models, entities, or domain directory) references Flutter UI types such as Widget, BuildContext, Color, or TextStyle. This couples domain logic to the Flutter framework, preventing code reuse in non-Flutter contexts (CLI tools, server-side Dart, packages), breaking testability without widget infrastructure, and violating clean architecture boundaries. {v5}
      avoid_unconstrained_images: true  # [INFO] Image without sizing constraints causes layout shifts on load. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v2}
      avoid_unnecessary_block: true  # [INFO] Unnecessary nested code blocks add clutter and reduce readability. They rarely serve a purpose and are often left from copy-paste or refactoring. {v4}
      avoid_unnecessary_collections: true  # [INFO] Wrapping an existing collection literal with List.of() or Set.of() creates a redundant copy, wasting memory and adding unnecessary overhead. The literal itself already produces the correct collection type. {v4}
