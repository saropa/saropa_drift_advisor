      avoid_navigator_push_without_route_name: true  # [INFO] Anonymous Navigator.push with inline MaterialPageRoute scatters route definitions throughout the codebase, making it impossible to see all routes in one place, complicating deep linking, and preventing analytics from tracking navigation paths by name. {v4}
      avoid_negations_in_equality_checks: true  # [INFO] Equality check is wrapped in a negation operator !(a == b) instead of using the direct != operator. The negated form adds unnecessary cognitive overhead, increases nesting depth, and is harder to scan during code review. The != operator expresses the same intent more clearly and concisely. {v4}
      avoid_nested_extension_types: true  # [INFO] Extension type wraps another extension type, creating multiple layers of zero-cost abstraction. Each layer adds indirection to the representation type, making the code harder to reason about and increasing the chance of applying the wrong extension methods to the underlying value. {v3}
      avoid_nested_futures: true  # [WARNING] Future<Future<T>> detected. Outer Future resolves to inner Future, not value - requires double await. Consequence: This pattern makes code harder to read, maintain, and debug, and can introduce subtle async bugs and runtime errors. {v4}
      avoid_nested_navigators_misuse: true  # [WARNING] Nested Navigator without WillPopScope/PopScope. Back button may behave unexpectedly. {v2}
      avoid_nested_records: true  # [INFO] Nested record type creates deeply coupled structure that is difficult to read, maintain, and refactor. Inner record positions become ambiguous (e.g., value.$1.$2), and changes to the inner record layout silently break all access sites without a compile-time error in many cases. {v5}
      avoid_nested_streams_and_futures: true  # [WARNING] Stream<Future<T>> or Future<Stream<T>> detected. Complex to consume - each item needs await or stream needs await. This increases cognitive load and can lead to memory leaks, unclosed stream subscriptions, or missed events. {v4}
      avoid_nested_switch_expressions: true  # [INFO] Switch expression contains another switch expression, creating multi-level branching that is extremely difficult to read and reason about. Each nesting level multiplies the number of result paths, making the expression fragile and hard to maintain. {v4}
      avoid_nested_switches: true  # [INFO] Switch statement contains another switch statement, creating multi-dimensional branching that is hard to follow and test. Each nesting level multiplies the number of code paths, making exhaustive testing impractical and bugs harder to locate. {v4}
      avoid_non_ascii_symbols: true  # [INFO] String contains non-ASCII characters. Non-ASCII characters can cause encoding issues and may be hard to distinguish visually (e.g., different types of spaces). {v4}
      avoid_non_empty_constructor_bodies: true  # [INFO] Constructor body has logic. Final fields cannot be set in body, only initializers. Constructor bodies with logic can be harder to understand. Prefer using initializer lists or factory constructors. {v4}
      avoid_nullable_tostring: true  # [INFO] Calling toString() on a nullable value. Calling .toString() on a nullable value without null check. This type usage can cause unexpected runtime behavior or weaken static analysis effectiveness. {v4}
