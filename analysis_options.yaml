      prefer_semver_version: true  # [WARNING] pubspec.yaml version should follow semantic versioning (major.minor.patch).
      prefer_simpler_boolean_expressions: true  # [INFO] Boolean expression contains redundant negations or can be reduced using De Morgan's law. Complex negated compound expressions are harder to read and more error-prone during modification than their simplified equivalents. {v3}
      prefer_single_container: true  # [INFO] Nested decoration widgets could be a single Container. Using nested Padding, DecoratedBox, etc. is verbose when Container provides all these features in one widget. {v2}
      prefer_single_setstate: true  # [INFO] Multiple setState calls cause unnecessary rebuilds. Two or more setState calls are made on the same straight-line execution path. This increases build() cost, causing unnecessary widget rebuilds that degrade scroll performance. setState calls in separate closures (e.g. distinct onPressed handlers) or in mutually-exclusive branches (if/else arms, switch cases, try/catch) are not flagged because they can never both run in a single pass and cannot be merged. {v4}
      prefer_single_ticker_provider_state_mixin: true  # [INFO] This State class declares only one AnimationController but mixes in TickerProviderStateMixin, which exists for multi-ticker states and allocates a list for the additional tickers it will never receive here. SingleTickerProviderStateMixin is the framework default for single-controller state — cheaper at runtime and intent-revealing to any reader scanning the class header. {v1}
      prefer_sized_box_for_whitespace: true  # [INFO] Container creates unnecessary intermediate widgets (DecoratedBox, ConstrainedBox) when used only for whitespace. SizedBox is a single lightweight widget with fewer allocations and faster layout. {v3}
      prefer_skeleton_over_spinner: true  # [INFO] CircularProgressIndicator for content loading. Prefer skeleton loaders. This pattern increases maintenance cost and the likelihood of introducing bugs during future changes. {v2}
      prefer_sliver_app_bar: true  # [INFO] Use SliverAppBar inside CustomScrollView, not AppBar. SliverAppBar integrates with CustomScrollView for scroll-based effects like collapsing, floating, and pinning. {v5}
      prefer_sliver_list: true  # [WARNING] Use SliverList instead of ListView inside CustomScrollView. Using ListView inside CustomScrollView creates nested scrollables. Use SliverList for proper sliver composition. {v6}
      prefer_specific_cases_first: true  # [WARNING] General switch case appears before a more specific case. In Dart, the first matching case wins, so a broad pattern placed early shadows narrower patterns below it, making those specific cases unreachable dead code. {v4}
      prefer_spring_animation: true  # [INFO] CurvedAnimation with a physics-like curve (bounceOut, elasticOut, bounceIn, elasticIn, etc.) is being used where a SpringSimulation would produce smoother, more natural-feeling motion. CurvedAnimation uses a fixed duration that cannot respond to user input velocity, causing disconnects between gesture speed and animation behavior that feel artificial and jarring to users. {v2}
      prefer_sqflite_column_constants: true  # [INFO] String literal column name may contain typos. String literals for column names are error-prone. Use constants for compile-time checking. This file handling can cause data corruption, resource leaks, or permission errors. {v2}
      prefer_stream_distinct: true  # [INFO] Stream.listen() without .distinct() may process duplicate values unnecessarily. {v3}
      prefer_string_for_typeof_equals: true  # [WARNING] In Dart 3.2, dart:js_interop `typeofEquals` now takes String instead of JSString. Passing JSString-shaped arguments reflects the pre-3.2 API and should be migrated to plain Dart strings. {v1}
      prefer_system_theme_default: true  # [INFO] Hardcoded ThemeMode ignores user's OS dark mode preference. Using ThemeMode.light or ThemeMode.dark ignores user's OS preference. Default to ThemeMode.system to respect user settings, with option to override. {v3}
      prefer_tabbar_theme_indicator_color: true  # [WARNING] The 'indicatorColor' property on ThemeData was deprecated in Flutter 3.32.0 (PR #160024) as part of the Material Theme System Updates. Using ThemeData.indicatorColor directly bypasses the component-level theme system and will be removed in a future Flutter release. Migrate to TabBarThemeData.indicatorColor to keep tab indicator colors consistent with the Material Theme System. {v1}
      prefer_test_find_by_key: true  # [INFO] find.byType() is fragile. Use find.byKey() for reliable widget testing. Using find.byType can be fragile when widget structure changes. Using find.byKey with ValueKey or Key is more reliable and explicit. {v3}
      prefer_test_wrapper: true  # [INFO] Widget test should wrap with MaterialApp/CupertinoApp. Most widgets need MaterialApp ancestor for theming and localization. Note: This rule ignores teardown patterns where simple widgets like SizedBox, Container, or Placeholder are pumped to unmount the widget tree before disposal. {v4}
      prefer_text_input_action: true  # [INFO] TextField without textInputAction. Keyboard action button unclear. Setting textInputAction helps users navigate forms efficiently with the keyboard action button (Done, Next, Search, etc.). {v2}
      prefer_transform_over_container: true  # [INFO] Container with only transform must be a Transform. When Container only has a transform property, use Transform widget instead to improve semantics and performance. {v2}
      prefer_tween_sequence: true  # [INFO] Multiple chained animations are implemented without using TweenSequence, which can lead to complex, error-prone code and unpredictable animation timing. TweenSequence simplifies sequential animations, making them easier to manage and ensuring smooth transitions. Use TweenSequence for sequential property changes to improve maintainability and user experience. {v2}
      prefer_type_sync_over_is_link_sync: true  # [WARNING] FileSystemEntity.isLinkSync unconditionally returns false on Windows (documented dart:io behavior), which silently breaks cross-platform symbolic-link checks. Use FileSystemEntity.typeSync(path, followLinks: false) == FileSystemEntityType.link instead — it reports links correctly on Windows, macOS, and Linux. This bug is easy to miss because it only manifests when the code actually runs on Windows. {v1}
      prefer_using_list_view: true  # [WARNING] Column inside SingleChildScrollView. A "Column" is being used inside a "SingleChildScrollView" Flutter to pre-render the entire list, bypassing "Lazy Loading" optimizations. This layout configuration can also trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v6}
      prefer_utf8_encode: true  # [INFO] Utf8Encoder().convert(x) is verbose and unnecessary. Since Dart 2.18 / Flutter 3.16 (PR #130567), utf8.encode(x) returns Uint8List directly and is the idiomatic replacement. The Utf8Encoder constructor form adds a needless intermediate object. Prefer the shorter utf8.encode(x) call from dart:convert for clarity and consistency with Dart SDK conventions. {v1}
      prefer_value_listenable_builder: true  # [INFO] Simple single-value state managed with setState causes the entire widget subtree to rebuild on every change. ValueListenableBuilder isolates rebuilds to only the affected subtree, significantly reducing unnecessary widget tree comparisons, improving frame rendering performance, and lowering battery consumption. {v4}
      prefer_video_loading_placeholder: true  # [INFO] Video player must have a loading placeholder. Video widgets should show a placeholder while loading to provide visual feedback and prevent layout shifts. {v2}
      prefer_visibility_over_opacity_zero: true  # [INFO] Using Opacity with a literal opacity of 0 or 0.0 hides the widget but still inserts an opacity compositing layer into the render tree, consuming GPU resources for nothing. The Visibility widget (available since Flutter 3.7) skips painting the child entirely when visible is false, avoiding compositing overhead and reducing the render tree. This pattern was adopted across the Flutter framework in PR #112191. {v1}
      prefer_where_or_null: true  # [INFO] Using firstWhere/lastWhere/singleWhere with an orElse callback is verbose and harder to read. The *OrNull variant from package:collection combined with ?? produces cleaner, more idiomatic Dart code. {v4}
      prefer_wrap_over_overflow: true  # [INFO] Row with many children may overflow - Use Wrap. DefaultTextStyle provides consistent typography without repeating styles. Text widgets are not wrapped with DefaultTextStyle. {v5}
