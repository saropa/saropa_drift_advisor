# Analysis options for pure Dart package (no Flutter).
# saropa_lints is in dev_dependencies; use the plugins: saropa_lints: section below (no include:).
# Do NOT add: include: package:saropa_lints/analysis_options.yaml — that URI is not provided by saropa_lints 6.x.

# Dart 3.7+ "tall" formatter style. Explicit page_width makes the setting visible.
formatter:
  page_width: 80

analyzer:
  exclude:
    - "**/*.bak"
    - "**/*.g.dart"
    - ".dart_tool/**"
    - "build/**"

  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    missing_required_param: error
    missing_return: error
    todo: ignore

# cspell:disable

linter:
  rules:
    - avoid_empty_else
    - avoid_print
    - cancel_subscriptions
    - close_sinks
    # pub.dev/pana scores this even though it is not in our base set; enabling
    # it locally so `dart analyze` and `dart fix` catch dangling library doc
    # comments (a top-of-file /// comment with no `library;` directive).
    - dangling_library_doc_comments
    - literal_only_boolean_expressions
    - no_duplicate_case_values
    - prefer_void_to_null
    # unnecessary_await_in_return removed: we preserve return await for async stack traces (prefer_return_await).
    - unnecessary_brace_in_string_interps
    - unnecessary_null_checks
    - unnecessary_statements
    - unnecessary_underscores
    - valid_regexps

plugins:
  saropa_lints:
    version: "14.3.2"
    rule_packs:
      enabled:
        - collection_compat
        - dart_sdk_3_2
        - dart_sdk_3_4
        - testing
    # ═══════════════════════════════════════════════════════════════════
    # SAROPA LINTS CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════
    # Regenerate with: dart run saropa_lints:init --tier professional
    # Tier: professional (1483 of 2327 rules enabled)
    # Lint rules are disabled by default. Set to true to enable.
    # User customizations are preserved unless --reset is used
    #
    # Tiers (cumulative):
    #   1. essential    - Critical: crashes, security, memory leaks
    #   2. recommended  - Essential + accessibility, performance
    #   3. professional - Recommended + architecture, testing
    #   4. comprehensive - Professional + thorough coverage
    #   5. pedantic     - All rules (pedantic, highly opinionated)
    #   +  stylistic    - Opt-in only (formatting, ordering)
    #
    # Disabled platforms: macos, web, windows, linux
    #
    # Disabled packages: bloc, provider, riverpod, getx, flutter_hooks, equatable, freezed, firebase, isar, hive, shared_preferences, sqflite, drift, dio, graphql, supabase, get_it, workmanager, url_launcher, geolocator, qr_scanner, quick_actions, in_app_review, home_widget, device_calendar, file_picker, local_auth, geocoding, image_picker, google_maps_flutter, audioplayers, flutter_map, youtube_player_flutter, cached_network_image, permission_handler, http, app_links, receive_sharing_intent, sign_in_with_apple, lottie, flutter_animate, awesome_notifications, share_plus, sensors_plus, flutter_svg, connectivity_plus, google_sign_in, webview_flutter, flame
    #
    # Settings (max_issues, platforms, packages) are in analysis_options_custom.yaml
    # ═══════════════════════════════════════════════════════════════════

    diagnostics:
      #
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      #   ◆ USER CUSTOMIZATIONS
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      #
      # These rules have been manually configured and will be preserved
      # when regenerating. Use --reset to discard these customizations.

      avoid_adjacent_strings: false  # [INFO] Adjacent string literals detected without an explicit concatenation operator. Dart implicitly joins adjacent strings, which can mask accidental line breaks or missing commas in list literals, leading to silently merged values that are difficult to debug. {v4}
      avoid_always_null_parameters: false  # [INFO] Parameter is explicitly passed as null at every call site. Passing null as a constant argument adds noise, makes the call site harder to read, and defeats the purpose of optional parameters, which default to null when omitted. {v4}
      avoid_async_call_in_sync_function: false  # [WARNING] Async function called inside a synchronous function without handling the returned Future. The Future is silently discarded, so any errors thrown by the async operation are swallowed and any result is lost, making failures invisible. {v5}
      avoid_barrel_files: false  # [INFO] File contains only export statements (barrel file). Barrel files increase build times by pulling in unused code and obscure dependency tracking, making it harder to identify which modules depend on which implementations. {v6}
      avoid_cache_stampede: false  # [WARNING] Async method uses a Map cache without in-flight request deduplication. When multiple concurrent callers miss the cache simultaneously, each triggers a separate expensive fetch (cache stampede / thundering herd). Dart's async event loop means multiple awaits can interleave and all see the empty cache before any write completes. This causes redundant API calls, wasted bandwidth, potential server overload, and possible data corruption from race conditions. {v1}
      avoid_catching_generic_exception: false  # [WARNING] Catching Exception or Object swallows all errors including programming bugs, assertion failures, and unexpected states that should crash visibly. This masks root causes, making bugs harder to diagnose and allowing the app to continue in a corrupted state. {v4}
      avoid_classes_with_only_static_members: false  # [INFO] Class has only static members. In Dart, prefer top-level functions and constants for better tree-shaking and discoverability.
      avoid_collapsible_if: false  # [INFO] Nested if statement without an else clause can be merged with its parent if. The extra nesting level adds indentation and cognitive load without any logical benefit, making the combined condition harder to scan than a single flattened check. {v5}
      avoid_complex_conditions: false  # [INFO] Condition has more than 3 logical operators. Complex conditions with many logical operators are hard to understand. Extract parts into named boolean variables. {v3}
      avoid_deep_nesting: false  # [WARNING] Code nested more than 5 levels deep is difficult to read, test, and maintain. Deep nesting increases cyclomatic complexity and makes control flow hard to follow. Refactor by extracting helper methods, using early returns, or restructuring conditional logic into guard clauses. {v1}
      avoid_default_tostring: false  # [INFO] Class relies on default toString() implementation which returns unhelpful output like "Instance of 'ClassName'". During debugging, logging, or error messages, developers see meaningless object identifiers instead of the actual state values needed to diagnose issues. {v5}
      avoid_digit_separators: false  # [INFO] Unnecessary digit separator in small number. Digit separators in small numbers don't improve readability. {v6}
      avoid_duplicate_string_literals: false  # [INFO] String literal appears 3+ times in this file. Consider extracting to a constant. {v1}
      avoid_duplicate_string_literals_pair: false  # [INFO] String literal appears 2+ times in this file. Consider extracting to a constant. {v1}
      avoid_dynamic_type: false  # [INFO] 'dynamic' type disables static type checking, hiding errors until runtime. Method calls on dynamic values are never verified by the compiler, so typos, missing methods, and wrong argument types only surface as NoSuchMethodError crashes in production. Exempt: type arguments (e.g. List<dynamic>, Map<String, dynamic>), closure parameters, and for-in loop variables. {v5}
      avoid_excessive_expressions: false  # [INFO] Expression has excessive complexity (>5 operators). Complex expressions are hard to read and maintain. This excessive complexity makes the code harder to understand, test, and maintain. {v4}
      avoid_expensive_log_string_construction: false  # [INFO] Log call uses string interpolation; the string is built even when the log level would not print it. Add a level guard or use a lazy message. {v1}
      avoid_god_class: false  # [WARNING] Class declares more than 15 fields or 20 methods, violating the Single Responsibility Principle. God classes accumulate unrelated responsibilities, making them difficult to understand, test, and maintain. Changes to one responsibility risk breaking others, and the class becomes a merge-conflict magnet as multiple developers modify it concurrently. {v6}
      avoid_hardcoded_locale_strings: false  # [WARNING] `[HEURISTIC]` Hardcoded string in Text widget. Use localization for user-visible text. {v2}
      avoid_high_cyclomatic_complexity: false  # [WARNING] Functions with cyclomatic complexity exceeding 15 have too many branching paths, making them difficult to understand, test exhaustively, and maintain over time. Each branch doubles the testing surface area. Simplify by extracting helper methods or using polymorphism instead of conditionals. {v2}
      avoid_immediately_invoked_functions: false  # [INFO] Function is immediately invoked after definition. Immediately invoked function expressions (IIFE) can be confusing and usually indicate the code must be refactored. {v4}
      avoid_ios_debug_code_in_release: false  # [INFO] Debug code detected. Ensure this is conditionally compiled out for release builds. {v2}
      avoid_ios_simulator_only_code: false  # [WARNING] iOS Simulator-only code pattern detected. This code may not work on real iOS devices. {v2}
      avoid_json_in_main: false  # [INFO] jsonDecode on main thread blocks UI for large payloads (100KB+). jsonDecode() for large payloads (>100KB) blocks the main thread. Use compute() to parse JSON in a background isolate. {v2}
      avoid_large_list_copy: false  # [INFO] List.from() and toList() allocate a new list and copy every element, doubling memory consumption for the duration of the operation. For large collections, this triggers garbage collection pauses that freeze the UI and degrade scrolling performance. The unnecessary allocation pressure accumulates rapidly in loops or frequently called methods. List<T>.from() with type args and structurally-required .toList() are exempt. {v4}
      avoid_late_keyword: false  # [INFO] Field declared with the 'late' keyword defers initialization checking to runtime. If the field is accessed before assignment, Dart throws a LateInitializationError that crashes the app, bypassing the null safety guarantees the type system provides at compile time. {v7}
      avoid_local_functions: false  # [INFO] Local function declared inside another function. Local functions increase nesting depth, cannot be tested independently, and make the enclosing function harder to read and reason about. {v5}
      avoid_long_functions: false  # [INFO] Function body exceeds 100 code lines (comments and blank lines excluded). Long functions are harder to understand, test in isolation, and debug because they typically handle multiple concerns and have complex control flow paths. {v5}
      avoid_long_length_files: false  # [INFO] File exceeds 500 code lines (comments and blank lines excluded). Files this long are difficult to navigate, increase code review time, and frequently indicate that the file handles multiple unrelated concerns. {v4}
      avoid_long_parameter_list: false  # [INFO] Function has too many parameters (max 5). Functions with many parameters are difficult to call correctly, hard to test with all combinations, and indicate the function may be doing too much work. {v6}
      avoid_medium_length_files: false  # [INFO] File exceeds 300 code lines (comments and blank lines excluded). Files beyond this threshold often contain multiple responsibilities, which makes navigation harder and increases merge conflict risk in team development. {v4}
      avoid_misused_set_literals: false  # [INFO] Set literal may be misused. Empty `{}` without type annotation creates a Map, not a Set. {v2}
      avoid_misused_test_matchers: false  # [WARNING] Raw literal used as a test matcher instead of a proper matcher function. Using literals (true, false, null) as the second argument to expect() produces poor failure messages that show "Expected: true, Actual: false" instead of descriptive matcher output. Proper matchers like isTrue, isFalse, isNull, hasLength, equals, and isA provide clearer assertion semantics and significantly better diagnostic output when tests fail, making debugging faster. {v1}
      avoid_negated_conditions: false  # [INFO] Condition uses negation (!) where a positive equivalent exists. Negated conditions force readers to mentally invert the logic, increasing cognitive load and the likelihood of misreading compound boolean expressions during code review. {v4}
      avoid_nested_conditional_expressions: false  # [INFO] Ternary expression contains another ternary, creating a multi-level conditional that is difficult to parse visually. Nested ternaries lack clear precedence at a glance and are a common source of logic errors during editing. {v4}
      avoid_nested_shorthands: false  # [INFO] Deeply nested shorthand syntax (e.g., cascades inside ternaries inside null-aware operators) reduces readability and makes expressions difficult to understand at a glance. Each nesting level multiplies cognitive load, increasing the risk of logic errors during code review and maintenance. {v5}
      avoid_nested_try: false  # [INFO] Try-catch block nested inside another try-catch, creating layered error handling that is difficult to trace. Nested try blocks obscure which catch clause handles which error, increasing the risk of swallowing exceptions or applying the wrong recovery logic. {v4}
      avoid_nullable_interpolation: false  # [WARNING] Nullable value in string interpolation produces the literal text 'null' instead of a meaningful fallback. Users may see 'Hello null' or 'Order #null' in the UI, which looks like a bug and erodes trust in the application quality and data integrity. {v6}
      avoid_nullable_parameters_with_default_values: false  # [INFO] Parameter with default value must not be nullable. If a parameter has a default value, it doesn't need to be nullable. Quick fix available: Adds a comment to flag for manual review. {v5}
      avoid_parameter_mutation: false  # [WARNING] Parameter object is being mutated. This modifies the caller's data. {v3}
      avoid_passing_default_values: false  # [INFO] Argument explicitly passes a value that matches the parameter default (e.g. empty list, false, 0). Passing the default adds noise to the call site without changing behavior, and if the library updates its default, this call site will not benefit from the change. {v4}
      avoid_platform_specific_imports: false  # [WARNING] dart:io import detected in shared code. dart:io is unavailable on web and will cause compile failures when targeting browser platforms. Shared library code and packages that support multiple platforms should use conditional imports or package:universal_io to remain platform-agnostic. {v1}
      avoid_positional_boolean_parameters: false  # [INFO] Positional bool parameter makes call sites unreadable. Use named parameters for clarity.
      avoid_positional_record_field_access: false  # [INFO] Positional record field access ($1, $2) is cryptic and forces readers to count positions to understand the code. As records grow, positional access becomes increasingly error-prone and makes refactoring dangerous, since reordering fields silently changes which value each accessor returns. {v5}
      avoid_recursive_calls: false  # [INFO] Function contains a direct recursive call to itself with no detected terminating base case (no guard clause that returns or throws on a non-recursive path before recursing). Unbounded recursion exhausts the call stack and crashes the application with a StackOverflowError, which cannot be caught in Dart. {v6}
      avoid_screenshot_sensitive: false  # [INFO] Sensitive screen allows screenshots and screen recording. Financial and authentication screens should disable screenshots using platform APIs to prevent sensitive data exposure. {v5}
      avoid_similar_names: false  # [INFO] Variable name differs from another in-scope variable by only one or two characters. Near-identical names increase the risk of accidentally using the wrong variable, producing subtle bugs that pass code review because the names look correct at a glance. {v4}
      avoid_stack_trace_in_production: false  # [WARNING] Stack trace exposed to user-visible output. Stack traces contain internal class names, file paths, package versions, and line numbers that leak implementation details to users and potential attackers. This violates OWASP M10 (Extraneous Functionality) and aids in crafting targeted exploits against your application architecture. {v1}
      avoid_static_state: false  # [WARNING] Static mutable state persists across hot-reloads and tests, causing stale data and inconsistent behavior. Tests fail unpredictably due to shared state leaking between runs, and production bugs become hard to reproduce across different app sessions and isolates. {v4}
      avoid_string_substring: false  # [WARNING] substring() throws RangeError if start or end indices are out of bounds, causing runtime crashes when input lengths vary. This is especially dangerous with user input, API responses, or dynamically sized strings where the length cannot be guaranteed at compile time. {v3}
      avoid_throw_in_catch_block: false  # [WARNING] Throwing a new error in a catch block without preserving the original stack trace makes debugging much harder. This can hide the root cause of failures and lead to incomplete error logs, making it difficult to diagnose and fix issues. {v6}
      avoid_throw_objects_without_tostring: false  # [INFO] Thrown objects without a useful toString() method produce cryptic error logs that hinder troubleshooting. When caught in production, these errors display unhelpful messages like "Instance of MyClass" instead of actionable details, making it nearly impossible to diagnose root causes from crash reports. {v7}
      avoid_unassigned_fields: false  # [INFO] Field declared without an initializer and no constructor or method assigns it a value. Reading this field returns the default value (null for nullable types), which may cause unexpected NullPointerExceptions or logic errors if the caller expects a meaningful value. {v4}
      avoid_unawaited_future: false  # [WARNING] Not awaiting a Future means any errors or exceptions it throws may be silently lost, leading to missed bugs and unreliable app behavior. This is especially risky in production code where error reporting is critical. {v3}
      avoid_unmarked_public_class: false  # [INFO] Public class lacks an explicit class modifier. Dart 3.0 introduced class modifiers (base, final, interface, sealed). For API stability, public classes should declare their inheritance intent. {v3}
      avoid_unnecessary_call: false  # [INFO] Using .call() on a function or callable is redundant. Dart automatically calls .call() when you use (). {v4}
      avoid_unnecessary_null_aware_elements: false  # [INFO] Null-aware spread (...?) is unnecessary when the collection is never null. Use ... instead.
      avoid_unnecessary_nullable_fields: false  # [INFO] Nullable field is always assigned a non-null value across all constructors and assignment sites. The unnecessary nullable type forces every read site to handle null even though it can never occur, adding redundant null checks and obscuring the actual data flow. {v4}
      avoid_unnecessary_to_list: false  # [INFO] .toList() may be unnecessary here. Lazy iterables are more efficient. Calling .toList() after .map(), .where(), .take(), etc. creates an intermediate list that may not be needed. Dart's lazy iterables are more memory efficient. {v3}
      avoid_unused_after_null_check: false  # [INFO] Variable is null-checked in a condition but never referenced inside the guarded block. The null check implies the variable is needed, so the missing reference likely indicates a logic error where the intended usage was accidentally omitted. {v3}
      avoid_unused_assignment: false  # [INFO] Variable is assigned a value that is never read before being overwritten or going out of scope. The assignment wastes computation, and the unused result often signals a logic error where the value was meant to be used in a subsequent expression or return statement. {v3}
      avoid_unused_parameters: false  # [INFO] Function parameter is declared but never referenced in the function body. Unused parameters add cognitive overhead for callers who must provide a value that has no effect, and they mask API design issues — either remove the parameter or complete the implementation that was supposed to use it. {v6}
      avoid_very_long_length_files: false  # [INFO] File exceeds 1000 code lines (comments and blank lines excluded). Files this large significantly slow down IDE indexing, increase build times, and make it nearly impossible to understand the full scope of changes during code review. {v4}
      avoid_work_in_paused_state: false  # [WARNING] Timer.periodic without lifecycle handling. Will run when app is backgrounded. Timers and periodic callbacks should pause when the app is backgrounded to save battery and avoid unexpected behavior. {v2}
      function_always_returns_null: false  # [WARNING] Function returns null on every code path, making the return type effectively void. Callers that check or use the return value are performing dead logic, and the nullable return type misleads developers into thinking the function can return meaningful data. {v6}
      handle_throwing_invocations: false  # [INFO] This invocation can throw. Wrap in try/catch or annotate the containing method with @Throws to propagate.
      limit_max_imports: false  # [INFO] File has more than 20 imports. A high import count signals the file depends on too many modules, which increases coupling, makes refactoring risky, and slows incremental compilation. {v3}
      match_getter_setter_field_names: false  # [INFO] Getter/setter name should match the backing field. Getter/setter must have the same name as the backing field (without underscore). {v4}
      missing_use_result_annotation: false  # [INFO] Function returns a value without @useResult annotation. Callers may accidentally ignore the return value, leading to missed error handling, lost data transformations, or incorrectly assuming the function has side effects when it does not. {v5}
      move_records_to_typedefs: false  # [INFO] Inline record with >3 fields reduces readability. Complex record types are easier to read as typedefs. This pattern matching usage can cause unexpected behavior or miss important type information. {v5}
      move_variable_closer_to_its_usage: false  # [INFO] Variable declared far from its first use, with several unrelated statements in between. This forces readers to hold the variable in memory while reading irrelevant code, reducing comprehension and increasing the risk of accidental reuse or shadowing. {v8}
      move_variable_outside_iteration: false  # [INFO] Variable declared and assigned inside a loop body produces the same value on every iteration. Recreating the same object or computing the same expression repeatedly wastes CPU cycles and puts unnecessary pressure on the garbage collector. {v4}
      no_magic_number: false  # [INFO] Unexplained numeric literal makes the code harder to understand, maintain, and update consistently. When the same value appears in multiple locations, a typo in one creates a subtle bug. Readers cannot determine whether the number represents a timeout, a threshold, a count, or an index without surrounding context. {v7}
      no_magic_string: false  # [INFO] Unexplained string literal makes the code harder to understand, maintain, and update consistently. Duplicate string values across the codebase lead to inconsistencies when one occurrence is updated but others are missed, causing hard-to-trace bugs in routing, API calls, or status checks. {v7}
      no_object_declaration: false  # [INFO] Member declared with type Object, which erases all type information. Accessing any property or method requires an unsafe downcast, bypassing compile-time type checking and risking runtime cast errors that could have been prevented with a more specific type. {v4}
      prefer_add_all: false  # [INFO] Looping with forEach or for-in to call add() one element at a time is verbose and slower than addAll(), which can pre-allocate capacity and copy elements in bulk. This pattern also obscures the intent of batch insertion. {v4}
      prefer_assigning_await_expressions: false  # [INFO] Inline await expression. Harder to debug and inspect intermediate values. Consequence: Extracting to a variable improves readability, makes debugging easier, and helps catch errors sooner. {v5}
      prefer_batch_requests: false  # [INFO] Multiple await calls in a loop. Consider a batch endpoint to reduce network overhead.
      prefer_cached_getter: false  # [INFO] Repeated getter calls recompute expensive values each time, wasting CPU cycles when caching would suffice. {v5}
      prefer_const_constructor_declarations: false  # [INFO] Constructor could be const. Class has only final fields; add const to the constructor declaration.
      prefer_correct_error_name: false  # [INFO] Catch parameter uses nonstandard name. Use "e" or "error" for consistency and readability. Consistent naming of catch parameters improves readability. {v4}
      prefer_correct_identifier_length: false  # [INFO] Very short (1-2 char) or very long (>30 char) identifiers measurably impact code comprehension speed. Optimal readability is achieved with 8-20 character names. {v6}
      prefer_correct_throws: false  # [INFO] Document thrown exceptions with @Throws annotation. Methods that throw should declare @Throws so callers know what to catch.
      prefer_declaring_const_constructor: false  # [INFO] Class could have a const constructor. A class could have a const constructor but doesn't. This class design reduces clarity and can lead to incorrect object initialization. {v5}
      prefer_descriptive_test_name: false  # [INFO] Test name must be descriptive. Test names must be descriptive and follow conventions. Test names don't follow the expected format. This reduces test maintainability and makes it harder to identify which behavior failed when tests break. {v7}
      prefer_digit_separators: true  # [INFO] Large number should use digit separators. Digit separators improve readability of large numbers. This numeric literal usage can cause precision errors or make the intended value unclear. {v4}
      prefer_explicit_parameter_names: false  # [INFO] Function type parameters must have descriptive names. Unnamed parameters lose intent and force callers to guess what each positional argument represents. {v4}
      prefer_extension_over_utility_class: false  # [INFO] Class with only static methods that share the same first parameter type could be an extension on that type.
      prefer_extension_type_for_wrapper: false  # [INFO] Single-field wrapper class could be an extension type for zero runtime cost (Dart 3.3+).
      prefer_extracting_callbacks: false  # [INFO] Inline callback exceeds a reasonable length, reducing readability and making the build method harder to maintain. Long inline closures obscure widget structure, complicate debugging, and prevent reuse of the callback logic across widgets. {v3}
      prefer_extracting_function_callbacks: false  # [INFO] Large inline callback detected spanning 10+ lines. Inline callbacks make code harder to read, test in isolation, and reuse across multiple call sites, reducing code maintainability and increasing complexity. {v4}
      prefer_final_locals: false  # [INFO] Local variable that is never reassigned should be declared final.
      prefer_ios_safe_area: false  # [INFO] Scaffold body without SafeArea may have content hidden by iOS notch or Dynamic Island. {v2}
      prefer_iterable_of: false  # [WARNING] Using .from() performs a runtime cast on each element, which can silently succeed with wrong types and throw later. The .of() constructor enforces type safety at the call site, catching type mismatches immediately. {v4}
      prefer_late_lazy_initialization: false  # [INFO] Field has non-const constructor initializer. Consider late if this field is rarely used.
      prefer_logger_over_print: false  # [INFO] Using print() for logging in production code is discouraged because print statements are not filterable, lack log levels, and may expose sensitive information in release builds. Proper logging allows for better control, filtering, and analysis of application events. {v3}
      prefer_match_file_name: false  # [INFO] When the primary class name does not match the file name, developers cannot use IDE file search to find declarations. This measurably slows navigation in large codebases. {v5}
      prefer_mixin_over_abstract: false  # [INFO] Abstract class with no abstract members and no generative constructor should be a mixin.
      prefer_moving_to_variable: false  # [INFO] Expression repeated multiple times within the same scope. Repeated expressions waste CPU recalculating the same value, make code harder to maintain when the logic changes, and increase the chance of typos creating subtle bugs. {v4}
      prefer_named_boolean_parameters: false  # [INFO] Positional boolean parameter detected. Call sites like doThing(true) give no indication what the boolean controls, forcing readers to look up the function signature to understand the intent. {v5}
      prefer_named_parameters: false  # [INFO] Function has too many positional parameters. Call sites with multiple positional arguments like create("a", 1, true, null) are error-prone because argument order is easy to confuse and provides no self-documentation. {v6}
      prefer_named_routes_for_deep_links: false  # [INFO] Anonymous route construction prevents deep linking. Use named routes or path-based routing.
      prefer_noun_class_names: false  # [INFO] Prefer noun/agent class names (e.g. Parser) over gerund (Parsing) or -able on concrete classes.
      prefer_parentheses_with_if_null: false  # [INFO] Add parentheses to clarify if-null expression precedence. If-null operator (??) is used without parentheses in potentially ambiguous expressions. This excessive complexity makes the code harder to understand, test, and maintain. {v4}
      prefer_pattern_destructuring: false  # [INFO] Multiple positional record field accesses could use destructuring. When accessing multiple positional fields from the same record variable, pattern destructuring is clearer and more idiomatic (Dart 3.0+). {v2}
      prefer_private_extension_type_field: false  # [INFO] Extension type representation field must be private. Extension type fields must be private for encapsulation. {v4}
      prefer_record_over_tuple_class: false  # [INFO] Simple data class with only final fields and a single constructor is a candidate for a record type.
      prefer_result_pattern: false  # [INFO] Throwing exceptions for recoverable errors like validation failures forces try-catch blocks at every call site and obscures control flow. This makes error handling inconsistent, increases boilerplate, and causes callers to miss failure cases entirely when they forget to add try-catch. {v5}
      prefer_safe_area_consumer: false  # [INFO] SafeArea placed directly inside a Scaffold body is often redundant because Scaffold already insets its body below the AppBar and above the BottomNavigationBar. Doubling up on safe area handling wastes vertical space and can push content further from the edges than intended. {v4}
      prefer_set_for_lookup: false  # [INFO] Calling contains() on a List performs a linear O(n) scan through every element, while a Set uses hash-based O(1) lookup. For collections used primarily for membership testing, this causes unnecessary performance degradation. {v5}
      prefer_setup_teardown: false  # [INFO] Duplicated test setup code. Use setUp()/tearDown(). Repeated setup code in tests violates DRY and makes maintenance harder. Use setUp() and tearDown() for common test initialization. {v8}
      prefer_shorthands_with_constructors: false  # [INFO] Lambda wraps a constructor call without adding any logic (e.g. (x) => MyClass(x)). The closure allocates an extra function object on each evaluation and obscures the simple delegation, making the code harder to read at a glance. {v4}
      prefer_single_declaration_per_file: false  # [INFO] File contains multiple top-level class, enum, or extension declarations. Combining unrelated declarations in one file makes it harder to locate definitions, increases merge conflicts when multiple developers edit the same file, and breaks the convention of one-declaration-per-file. {v3}
      prefer_split_widget_const: false  # [INFO] Large widget subtree with all-const children is rebuilt on every parent setState, even though its output never changes. Extracting it into a separate const widget class allows Flutter to skip rebuilding the entire subtree, reducing frame build times and improving scroll performance. {v6}
      prefer_static_before_instance: false  # [INFO] Static member should be declared before instance members of the same category.
      prefer_static_class: false  # [INFO] Class contains only static members and acts as a namespace. Static-only classes cannot be instantiated meaningfully, add unnecessary boilerplate, and prevent tree-shaking of unused members in the class. {v6}
