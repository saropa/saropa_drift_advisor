      prefer_never_over_always_throws: true  # [WARNING] The @alwaysThrows annotation from package:meta is deprecated since Dart 2.12. The Never return type provides the same guarantee at the language level — functions typed as Never cannot return normally, and the compiler uses this for flow analysis and dead-code detection. @alwaysThrows is only a hint that tooling may ignore. Migrate to a Never return type for stronger guarantees. {v1}
      prefer_null_aware_method_calls: true  # [INFO] Use null-aware operator (?.) instead of explicit null check and call.
