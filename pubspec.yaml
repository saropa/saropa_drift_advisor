name: saropa_drift_advisor
description: Debug-only HTTP server that exposes SQLite/Drift table data as JSON and a minimal web viewer. Use from any Drift (or raw SQLite) app via an injectable query callback.
version: 2.10.1

homepage: https://saropa.com
repository: https://github.com/saropa/saropa_drift_advisor
issue_tracker: https://github.com/saropa/saropa_drift_advisor/issues
documentation: https://pub.dev/documentation/saropa_drift_advisor/latest/

topics:
  - drift
  - sqlite
  - database
  - debug
  - flutter

screenshots:
  - description: Saropa Drift Advisor banner
    path: assets/banner_v2.png

# SDK >=3.9.0 balances modern language features with broad audience reach.
environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  # !! KEEP THIS LIST MINIMAL !!
  # This package ships inside consumer apps. Every
  # dependency here increases their install size and
  # attack surface. Add features to the VS Code
  # extension (extension/) instead of adding packages
  # here. Before adding a dependency, exhaust
  # dart:* standard library alternatives first.
  # (No runtime dependencies: Bearer auth uses plain
  # in-memory token comparison; Basic auth uses
  # dart:convert base64 only.)

dev_dependencies:
  # Saropa custom lints; use custom_lint CLI.
  # https://pub.dev/packages/saropa_lints/changelog
  saropa_lints: ^10.2.0

  # Unit test framework.
  # https://pub.dev/packages/test/changelog
  test: ^1.31.0
