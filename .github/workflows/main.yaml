name: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Trigger on default branch (main).
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Package depends on flutter SDK (pubspec.yaml); use Flutter so pub get and analyze succeed.
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --fatal-warnings (not --fatal-infos): saropa_lints is a caret dep with no
      # committed lockfile, so CI resolves whatever version is newest at run time.
      # A new saropa_lints minor that adds an info-level rule would otherwise red
      # Analyze on every PR — including unrelated dependency bumps — for advisory
      # noise. Warnings and errors still fail the build; the full lint quality
      # pass runs in scripts/publish.py.
      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Test
        run: flutter test
