name: publish

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev
    steps:
      - uses: actions/checkout@v6

      # Provision OIDC token for pub.dev (required for dart pub publish and dart pub uploader).
      - uses: dart-lang/setup-dart@v1

      # Package depends on flutter SDK (pubspec.yaml); use Flutter so pub get and analyze succeed.
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # Web viewer assets: style.css must be built from style.scss (edit only .scss, then npm run build:style).
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Build web assets (SCSS → CSS)
        run: npm ci && npm run build:style
      - name: Verify web assets in sync
        run: |
          if [ -n "$(git status --porcelain assets/web/style.css)" ]; then
            echo "::error::assets/web/style.css is out of sync with style.scss. Edit only style.scss, run 'npm run build:style', and commit style.css."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      # --fatal-warnings (not --fatal-infos): saropa_lints is a caret dep with no
      # committed lockfile, so CI resolves whatever version is newest at run time.
      # A new saropa_lints minor that adds an info-level rule would otherwise fail
      # the publish on advisory noise. Warnings and errors still fail; the full
      # lint quality pass runs in scripts/publish.py before tagging.
      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Run tests
        run: flutter test

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force
